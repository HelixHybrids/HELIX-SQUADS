function showArchiveSeasonModal(){
  const overlay=mk('div','modal-overlay');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9000;display:flex;align-items:center;justify-content:center;padding:16px;';
  const box=mk('div','');
  box.style.cssText='background:var(--surface);border-radius:14px;padding:22px 20px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.4);';
  const matchCount=S.history.filter(h=>{const all=[...h.team1,...h.team2];return !all.some(p=>{const rp=S.roster.find(r=>r.id===p.id);return rp&&rp.sandbox;});}).length;
  const playerCount=S.roster.filter(p=>!p.sandbox).length;
  // Default season name: infer from date range
  let defaultName='Season '+(S.seasons.length+1);
  if(S.history.length){
    const dates=S.history.map(h=>h.date).filter(Boolean).sort();
    if(dates.length){
      const[y,m]=dates[0].split('-');
      const monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      defaultName=`${monthNames[parseInt(m,10)-1]} ${y} Season`;
    }
  }
  box.innerHTML=`
    <div style="font-size:1.05rem;font-weight:700;color:var(--text);margin-bottom:4px">📦 Archive Season</div>
    <div style="font-size:.78rem;color:var(--text-muted);margin-bottom:16px">Creates a permanent snapshot of this season's data. Your roster and live history are unchanged — this is a copy.</div>
    <div style="display:flex;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:8px;margin-bottom:16px;">
      <div style="flex:1;text-align:center"><div style="font-size:1.3rem;font-weight:700;color:var(--green)">${playerCount}</div><div style="font-size:.68rem;color:var(--text-muted)">Players</div></div>
      <div style="flex:1;text-align:center"><div style="font-size:1.3rem;font-weight:700;color:var(--green)">${matchCount}</div><div style="font-size:.68rem;color:var(--text-muted)">Matches</div></div>
    </div>
    <label style="font-size:.78rem;color:var(--text-muted);display:block;margin-bottom:5px">Season Name</label>
    <input id="seas-name-in" type="text" value="${esc(defaultName)}" style="width:100%;box-sizing:border-box;padding:9px 11px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:.9rem;font-family:inherit;margin-bottom:16px;">
    <div id="seas-err" style="color:var(--red);font-size:.75rem;margin-bottom:8px;display:none;"></div>
    <div style="display:flex;gap:8px;">
      <button id="seas-cancel" class="btn btn-s btn-sm" style="flex:1">Cancel</button>
      <button id="seas-confirm" class="btn btn-p btn-sm" style="flex:2">📦 Archive Season</button>
    </div>`;
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  const inp=box.querySelector('#seas-name-in');
  inp.focus();inp.select();
  box.querySelector('#seas-cancel').onclick=()=>document.body.removeChild(overlay);
  overlay.onclick=(e)=>{if(e.target===overlay)document.body.removeChild(overlay);};
  box.querySelector('#seas-confirm').onclick=()=>{
    const name=(inp.value||'').trim();
    if(!name){const err=box.querySelector('#seas-err');err.textContent='Please enter a season name.';err.style.display='block';inp.focus();return;}
    const duplicate=S.seasons.some(s=>s.name.toLowerCase()===name.toLowerCase());
    if(duplicate){const err=box.querySelector('#seas-err');err.textContent='A season with that name already exists.';err.style.display='block';inp.focus();return;}
    const season={
      id:Date.now(),
      name,
      archivedAt:today(),
      roster:JSON.parse(JSON.stringify(S.roster.filter(p=>!p.sandbox))),
      history:JSON.parse(JSON.stringify(S.history)),
      teams:JSON.parse(JSON.stringify(S.teams)),
      nextId:S.nextId,
      matchCount,
      playerCount
    };
    S.seasons.push(season);
    saveSeas();
    document.body.removeChild(overlay);
    showSeasonArchivedToast(name);
    render();
  };
}

function showSeasonArchivedToast(name){
  const t=mk('div','');
  t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:10px;font-size:.85rem;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.3);pointer-events:none;white-space:nowrap;';
  t.textContent='📦 "'+name+'" archived!';
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .4s';setTimeout(()=>document.body.contains(t)&&document.body.removeChild(t),400);},2400);
}

function showArchivedSeasonModal(season){
  const overlay=mk('div','modal-overlay');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9000;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;';
  const box=mk('div','');
  box.style.cssText='background:var(--surface);border-radius:14px;padding:0;width:100%;max-width:480px;box-shadow:0 8px 40px rgba(0,0,0,.5);margin:auto;overflow:hidden;';

  // Header
  const hdr=mk('div','');
  hdr.style.cssText='background:var(--surface2);padding:16px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;';
  hdr.innerHTML=`<div><div style="font-size:1rem;font-weight:700;color:var(--text)">📦 ${esc(season.name)}</div><div style="font-size:.72rem;color:var(--text-muted)">Archived ${fD(season.archivedAt)} · ${season.playerCount} players · ${season.matchCount} matches</div></div><button id="seas-close-btn" style="border:none;background:none;font-size:1.3rem;cursor:pointer;color:var(--text-muted);line-height:1;padding:4px;">×</button>`;
  box.appendChild(hdr);

  const body=mk('div','');
  body.style.cssText='padding:16px 16px 20px;';

  // --- Standings card ---
  const hist=season.history||[];
  const roster=season.roster||[];
  if(hist.length&&roster.length){
    const stats={};
    roster.forEach(p=>{stats[p.id]={name:p.name,w:0,l:0,gw:0,gl:0,m:0};});
    hist.forEach(h=>{
      const v1=parseInt(h.score1),v2=parseInt(h.score2),win=v1>v2?1:v2>v1?2:0;
      [[h.team1,1],[h.team2,2]].forEach(([team,side])=>{
        team.forEach(p=>{
          if(!stats[p.id])return;
          stats[p.id].m++;
          const gw=side===1?v1:v2,gl=side===1?v2:v1;
          stats[p.id].gw+=gw;stats[p.id].gl+=gl;
          if(win===side)stats[p.id].w++;else if(win!==0)stats[p.id].l++;
        });
      });
    });
    const rows=Object.values(stats).filter(s=>s.m>0).sort((a,b)=>(b.w-b.l)-(a.w-a.l)||(b.gw-b.gl)-(a.gw-a.gl));
    if(rows.length){
      const sc=mk('div','card');sc.style.marginBottom='12px';
      sc.innerHTML=`<div class="ct">Season Standings</div>
        <table style="width:100%;border-collapse:collapse;font-size:.78rem;">
          <thead><tr style="color:var(--text-muted);font-size:.68rem;text-transform:uppercase;letter-spacing:.5px;">
            <th style="text-align:left;padding:4px 4px 6px;">Player</th>
            <th style="text-align:center;padding:4px;">W</th><th style="text-align:center;padding:4px;">L</th>
            <th style="text-align:center;padding:4px;">G±</th>
          </tr></thead>
          <tbody>${rows.slice(0,10).map((r,i)=>`<tr style="border-top:1px solid var(--border)">
            <td style="padding:5px 4px;font-weight:${i<3?600:400};color:var(--text)">${i===0?'🥇 ':i===1?'🥈 ':i===2?'🥉 ':''}${esc(r.name)}</td>
            <td style="text-align:center;color:var(--green);font-weight:600">${r.w}</td>
            <td style="text-align:center;color:var(--text-muted)">${r.l}</td>
            <td style="text-align:center;color:${(r.gw-r.gl)>=0?'var(--green)':'var(--red)'}">${r.gw-r.gl>0?'+':''}${r.gw-r.gl}</td>
          </tr>`).join('')}</tbody>
        </table>`;
      body.appendChild(sc);
    }
  }

  // --- Match log ---
  const logCard=mk('div','card');logCard.style.marginBottom='0';
  logCard.innerHTML=`<div class="ct">Match Log (${hist.length})</div>`;
  if(!hist.length){
    logCard.innerHTML+='<div class="empty">No matches recorded.</div>';
  } else {
    const bd={};hist.forEach(h=>{(bd[h.date]=bd[h.date]||[]).push(h);});
    Object.keys(bd).sort().reverse().forEach(date=>{
      logCard.innerHTML+=`<div class="divider"><div class="dl"></div><div class="dlt">${fD(date)}</div><div class="dl"></div></div>`;
      bd[date].forEach(h=>{
        const win=h.score1>h.score2?1:h.score2>h.score1?2:0,isD=h.fmt!=='singles';
        logCard.innerHTML+=`<div class="match-result">
          <div class="match-teams">
            <div style="font-size:.72rem;color:var(--muted);margin-bottom:3px"><span style="color:var(--lime)">Ct ${esc(h.court)}</span> <span class="fbadge ${isD?'fd':'fs'}">${isD?'D':'S'}</span>${h.eventName?' -- <em>'+esc(h.eventName)+'</em>':''}</div>
            <div><span style="font-weight:${win===1?700:400};color:${win===1?'var(--g)':'var(--text)'}">${h.team1.map(p=>esc(p.name)).join('/')}</span><span style="color:var(--muted);margin:0 5px">vs</span><span style="font-weight:${win===2?700:400};color:${win===2?'var(--g)':'var(--text)'}">${h.team2.map(p=>esc(p.name)).join('/')}</span></div>
          </div>
          <div class="match-score"><span class="${win===1?'score-win':'score-loss'}">${h.score1}</span><span style="color:var(--muted)"> - </span><span class="${win===2?'score-win':'score-loss'}">${h.score2}</span></div>
        </div>`;
      });
    });
  }
  body.appendChild(logCard);
  box.appendChild(body);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  box.querySelector('#seas-close-btn').onclick=()=>document.body.removeChild(overlay);
  overlay.onclick=(e)=>{if(e.target===overlay)document.body.removeChild(overlay);};
}

function deleteArchivedSeason(seasonId){
  if(!confirm('Delete this archived season? This cannot be undone.'))return;
  S.seasons=S.seasons.filter(s=>s.id!==seasonId);
  saveSeas();
  render();
}

function renderAnalytics(pg){
  if(!S.history.length){const c=mk('div','card');c.innerHTML='<div class="ct">Analytics</div><div class="empty">Play some live sessions to unlock analytics.</div>';pg.appendChild(c);return;}
  const sc=mk('div','card');
  sc.innerHTML=`<div class="ct">Player Analytics</div><select style="width:100%" id="anas"><option value="">Select a player...</option>${S.roster.map(p=>`<option value="${p.id}" ${S.apid===p.id?'selected':''}>${esc(p.name)}</option>`).join('')}</select>`;
  pg.appendChild(sc);
  $('anas').addEventListener('change',e=>{S.apid=parseInt(e.target.value)||null;render();});
  if(!S.apid)return;
  const pid=S.apid,player=S.roster.find(p=>p.id===pid);
  const mm=S.history.filter(h=>[...h.team1,...h.team2].some(p=>p.id===pid));
  if(!mm.length){const c=mk('div','card');c.innerHTML='<div class="empty">No history for this player yet.</div>';pg.appendChild(c);return;}
  const isW=h=>{const t1=h.team1.some(p=>p.id===pid);return t1?h.score1>h.score2:h.score2>h.score1;};
  const gW=h=>{const t1=h.team1.some(p=>p.id===pid);return t1?h.score1:h.score2;};
  const gL=h=>{const t1=h.team1.some(p=>p.id===pid);return t1?h.score2:h.score1;};
  const tw=mm.filter(isW).length,tgw=mm.reduce((s,h)=>s+gW(h),0),tgl=mm.reduce((s,h)=>s+gL(h),0);
  const ov=mk('div','card');
  ov.innerHTML=`<div class="ct">Overview -- ${esc(player&&player.name||'')}</div>
  <div class="sgrid"><div class="sbox"><div class="sv">${mm.length}</div><div class="sl">Matches</div></div><div class="sbox"><div class="sv">${tw}-${mm.length-tw}</div><div class="sl">Win-Loss</div></div><div class="sbox"><div class="sv">${mm.length?Math.round(tw/mm.length*100):0}%</div><div class="sl">Win Rate</div></div><div class="sbox"><div class="sv ${(tgw-tgl)>=0?'':'dn'}">${tgw-tgl>0?'+':''}${tgw-tgl}</div><div class="sl">Game Diff</div></div></div>`;
  pg.appendChild(ov);
  const pc=mk('div','card');pc.innerHTML='<div class="ct">Best Partners</div>';
  const ps={};mm.forEach(h=>{const ot1=h.team1.some(p=>p.id===pid),mt=ot1?h.team1:h.team2,won=isW(h);mt.filter(p=>p.id!==pid).forEach(p=>{if(!ps[p.id])ps[p.id]={name:p.name,w:0,t:0};ps[p.id].t++;if(won)ps[p.id].w++;});});
  const partners=Object.values(ps).sort((a,b)=>(b.w/b.t)-(a.w/a.t));
  if(!partners.length)pc.innerHTML+='<div class="empty">No partner data yet.</div>';
  else partners.forEach(p=>{const pct=Math.round(p.w/p.t*100);pc.innerHTML+=`<div class="brow"><div class="blbl">${esc(p.name)}</div><div class="btrack"><div class="bfill" style="width:${pct}%"></div></div><div class="bval">${p.w}-${p.t-p.w} (${pct}%)</div></div>`;});
  pg.appendChild(pc);
  const wc=mk('div','card');wc.innerHTML='<div class="ct">vs Rating Levels</div><div style="font-size:.72rem;color:var(--muted);margin-bottom:10px">Lower WTN = stronger.</div>';
  const bands=[{l:'Pro (< 15)',min:0,max:15},{l:'Elite (15-20)',min:15,max:20},{l:'Strong Advanced (20-25)',min:20,max:25},{l:'Advanced (25-30)',min:25,max:30},{l:'Intermediate (30-35)',min:30,max:35},{l:'Beginner (35-40)',min:35,max:40}];
  let hw=false;
  bands.forEach(b=>{let w=0,t=0;mm.forEach(h=>{const ot1=h.team1.some(p=>p.id===pid),opp=ot1?h.team2:h.team1;const ws=opp.map(p=>parseFloat(p.wtn)).filter(Boolean);if(!ws.length)return;const avg=ws.reduce((a,x)=>a+x,0)/ws.length;if(avg<b.min||avg>=b.max)return;t++;hw=true;if(isW(h))w++;});if(t>0){const pct=Math.round(w/t*100);wc.innerHTML+=`<div class="brow"><div class="blbl">${b.l}</div><div class="btrack"><div class="bfill" style="width:${pct}%"></div></div><div class="bval">${w}-${t-w} (${pct}%)</div></div>`;}});
  if(!hw)wc.innerHTML+='<div class="empty">Opponents need WTN ratings for this report.</div>';
  pg.appendChild(wc);
  const tc=mk('div','card');tc.innerHTML='<div class="ct">Trends Over Time</div>';
  const bd={};mm.forEach(h=>{(bd[h.date]=bd[h.date]||[]).push(h);});const dates=Object.keys(bd).sort();
  if(dates.length<2)tc.innerHTML+='<div class="empty">Need history from 2+ dates for trends.</div>';
  else dates.forEach(d=>{const ms=bd[d],dw=ms.filter(isW).length,pct=Math.round(dw/ms.length*100);tc.innerHTML+=`<div class="brow"><div class="blbl" style="min-width:80px">${fD(d)}</div><div class="btrack"><div class="bfill" style="width:${pct}%"></div></div><div class="bval">${dw}-${ms.length-dw}</div></div>`;});
  pg.appendChild(tc);
  const hc=mk('div','card');hc.innerHTML='<div class="ct">Head-to-Head</div>';
  const h2h={};mm.forEach(h=>{const ot1=h.team1.some(p=>p.id===pid),opp=ot1?h.team2:h.team1,won=isW(h),gf=gW(h),ga=gL(h);opp.forEach(op=>{if(!h2h[op.id])h2h[op.id]={name:op.name,w:0,l:0,gf:0,ga:0};h2h[op.id].gf+=gf;h2h[op.id].ga+=ga;if(won)h2h[op.id].w++;else h2h[op.id].l++;});});
  const h2ha=Object.values(h2h).sort((a,b)=>(b.w+b.l)-(a.w+a.l));
  if(!h2ha.length)hc.innerHTML+='<div class="empty">No head-to-head data yet.</div>';
  else hc.innerHTML+=`<table class="h2tbl"><thead><tr><th>Opponent</th><th>W-L</th><th>Games</th><th>+/-</th></tr></thead><tbody>${h2ha.map(r=>{const d=r.gf-r.ga;return `<tr><td style="font-weight:500">${esc(r.name)}</td><td>${r.w}-${r.l}</td><td>${r.gf}-${r.ga}</td><td class="${d>=0?'dp':'dn'}">${d>0?'+':''}${d}</td></tr>`;}).join('')}</tbody></table>`;
  pg.appendChild(hc);
  // ── SOS card
  const sosCard=mk('div','card');
  const _anaRange=groupWtnRange(S.roster, S.event&&S.event.playerIds||S.roster.map(p=>p.id));
  const _sosObj=calcSOS(pid,mm,S.roster,_anaRange);
  const playerSos=_sosObj;
  const sl2=_sosObj?{l:_sosObj.label,c:_sosObj.color}:{l:'No data',c:'var(--muted)'};
  const {exp:expW,tot:expTot}=calcExpectedWins(pid,mm,S.roster,_anaRange);
  const actualW=mm.filter(isW).length;
  const overPerf=Math.round((actualW-expW)*10)/10;
  sosCard.innerHTML=`<div class="ct">Strength of Schedule &amp; Prediction</div>
  <div style="font-size:.72rem;color:var(--muted);margin-bottom:12px">Based on logistic WTN model. Lower opponent WTN = tougher schedule.</div>
  <div class="sgrid">
    <div class="sbox"><div class="sv" style="color:${sl2.c}">${_sosObj?_sosObj.raw.toFixed(1):'—'}</div><div class="sl">Avg Opp WTN</div></div>
    <div class="sbox"><div class="sv" style="color:${sl2.c};font-size:.85rem">${sl2.l}</div><div class="sl">Schedule</div></div>
    <div class="sbox"><div class="sv">${expW}/${expTot}</div><div class="sl">Expected W</div></div>
    <div class="sbox"><div class="sv ${overPerf>0?'dp':overPerf<0?'dn':''}">${overPerf>0?'+':''}${overPerf}</div><div class="sl">vs Exp</div></div>
  </div>`;
  if(playerSos!==null){
    sosCard.innerHTML+=`<div style="margin-top:10px;font-size:.72rem;color:var(--muted)">${overPerf>0?'<span style="color:var(--g)">&#9650; Outperforming</span> WTN expectations — actual skill likely higher than rating.':overPerf<0?'<span style="color:#ff8c42">&#9660; Underperforming</span> WTN expectations — may reflect tough schedule or variance.':'<span style="color:var(--lime)">&#9654; On-target</span> — performing in line with WTN prediction.'}</div>`;
    // Per-match prediction breakdown
    sosCard.innerHTML+='<div style="margin-top:12px;font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Match Predictions vs Actuals</div>';
    mm.slice(-8).forEach(h=>{
      const onT1=h.team1.some(p=>p.id===pid);
      const myTeam=onT1?h.team1:h.team2;
      const oppTeam=onT1?h.team2:h.team1;
      const _myR=myTeam.map(p=>S.roster.find(r=>r.id===p.id)||p);
      const _opR=oppTeam.map(p=>S.roster.find(r=>r.id===p.id)||p);
      const prob=winProbRelative(_myR,_opR,S.roster,_anaRange);
      if(prob===null) return;
      const predSc=predictSetScore(prob,getFmt(S.event));
      const actualSc=(onT1?h.score1:h.score2)+'-'+(onT1?h.score2:h.score1);
      const won=isW(h);
      const oppNames=oppTeam.filter(Boolean).map(p=>p.name.split(' ')[0]).join('/');
      sosCard.innerHTML+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);font-size:.72rem">
        <span style="color:var(--muted)">vs ${esc(oppNames)}</span>
        <span style="color:var(--muted)">Pred: <span style="color:var(--lime)">${predSc}</span> (${Math.round(prob*100)}%)</span>
        <span class="${won?'dp':'dn'}">Act: ${actualSc} ${won?'W':'L'}</span>
      </div>`;
    });
  } else {
    sosCard.innerHTML+='<div class="empty">Opponents need WTN ratings to enable predictions.</div>';
  }
  pg.appendChild(sosCard);
  const ac=mk('div','card');ac.innerHTML='<div class="ct">Rating Accuracy</div><div style="font-size:.72rem;color:var(--muted);margin-bottom:10px">Lower WTN = stronger player.</div>';
  const pwtn=parseFloat(player&&player.wtn);
  if(!pwtn){ac.innerHTML+='<div class="empty">Add a WTN rating to this player to enable.</div>';}
  else{
    const over2=actualW-Math.round(expW);
    ac.innerHTML+=`<div class="wrow"><div style="flex:1"><div style="font-size:.85rem;font-weight:500">Expected wins (logistic model)</div><div style="font-size:.7rem;color:var(--muted)">${expTot} matches with WTN data</div></div><div style="font-family:Bebas Neue,sans-serif;font-size:1.6rem;color:var(--g)">${expW}/${expTot}</div></div>
    <div class="wrow"><div style="flex:1"><div style="font-size:.85rem;font-weight:500">Actual wins</div></div><div style="font-family:Bebas Neue,sans-serif;font-size:1.6rem;color:var(--g)">${actualW}/${mm.length}</div></div>
    <div class="wrow"><div style="flex:1"><div style="font-size:.85rem;font-weight:500">vs Expectation</div><div style="font-size:.7rem;color:var(--muted)">${overPerf>0?'Outperforming':overPerf<0?'Underperforming':'On-rating'}</div></div><div style="font-family:Bebas Neue,sans-serif;font-size:1.6rem" class="${overPerf>0?'dp':overPerf<0?'dn':''}">${overPerf>0?'+':''}${overPerf}</div></div>`;
  }
  pg.appendChild(ac);
}

if(S.event){
  if(!S.event.sessions||S.event.sessions.length===0){
    S.sub='setup';
  } else {
    S.sub=S.event.balanceMode==='manual'&&S.sub!=='play'?'play':'play';
  }
}
render();
</script>
</body>
</html>
