<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>HELIX | SQUADS — Moneyball for Competitive Tennis</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1a5c38;--green-light:#2a7a4e;--green-pale:#e8f2ec;--green-subtle:#f0f7f3;
  --gold:#c9a84c;--gold-light:#e8c96a;--gold-pale:#fdf8ee;
  --bg:#f7f8f6;--surface:#ffffff;--surface2:#f2f4f1;
  --border:#e0e5df;--border-strong:#c8d0c5;
  --text:#1a1f18;--text-mid:#4a5648;--text-muted:#8a9688;
  --red:#c0392b;--red-pale:#fdf0ee;
  --blue:#1a4a7a;--orange:#b85c00;
  --shadow:0 1px 3px rgba(26,42,24,.08),0 4px 12px rgba(26,42,24,.06);
  --shadow-lg:0 8px 32px rgba(26,42,24,.12),0 2px 8px rgba(26,42,24,.08);
}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}

/* ── Header ── */
.header{
  background:var(--green);
  padding:14px 20px;display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:200;
  box-shadow:0 2px 12px rgba(26,42,24,.2)
}
.logo{width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.app-title{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:4px;color:#ffffff;line-height:1}
.app-sub{font-size:.52rem;color:rgba(255,255,255,.6);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.hsp{flex:1}

/* ── Layout ── */
.main{flex:1;padding:20px;max-width:960px;margin:0 auto;width:100%}

/* ── Navigation ── */
.nav{display:flex;gap:2px;background:var(--surface2);border-radius:10px;padding:3px;margin-bottom:20px;border:1px solid var(--border)}
.nav button{flex:1;padding:8px 4px;border:none;background:transparent;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:500;border-radius:8px;cursor:pointer;transition:all .2s;white-space:nowrap}
.nav button.on{background:var(--green);color:#fff;font-weight:600;box-shadow:0 1px 4px rgba(26,92,56,.3)}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
.ct{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2.5px;color:var(--green);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}

/* ── Forms ── */
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;font-weight:600}
input,select{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 11px;font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;transition:all .2s}
input:focus,select:focus{border-color:var(--green);background:#fff;box-shadow:0 0 0 3px rgba(26,92,56,.1)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

/* ── Buttons ── */
.btn{cursor:pointer;border:none;border-radius:8px;padding:9px 18px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.88rem;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.btn-p{background:var(--green);color:#fff;box-shadow:0 1px 4px rgba(26,92,56,.3)}.btn-p:hover{background:var(--green-light);transform:translateY(-1px);box-shadow:0 4px 12px rgba(26,92,56,.25)}
.btn-s{background:var(--surface);color:var(--text);border:1px solid var(--border)}.btn-s:hover{border-color:var(--green);color:var(--green)}
.btn-r{background:var(--red-pale);color:var(--red);border:1px solid #e8c5c0}
.btn-sm{padding:5px 10px;font-size:.75rem}
.btn.sel{background:var(--green);color:#fff}

/* ── Dividers ── */
.divider{display:flex;align-items:center;gap:10px;margin:14px 0 12px}
.dl{flex:1;height:1px;background:var(--border)}
.dlt{font-family:'Bebas Neue',sans-serif;font-size:.7rem;letter-spacing:2px;color:var(--text-muted);white-space:nowrap}

/* ── Player chips ── */
.chip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;margin-bottom:10px}
.chip{background:var(--surface2);border:2px solid var(--border);border-radius:10px;padding:9px 11px;cursor:pointer;transition:all .15s;user-select:none;position:relative}
.chip:hover{border-color:var(--border-strong)}
.chip.sel{border-color:var(--green);background:var(--green-subtle)}
.chip.cp{border-color:var(--gold);background:var(--gold-pale)}
.chip-name{font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:18px;color:var(--text)}
.chip-meta{font-size:.65rem;color:var(--text-muted);margin-top:2px}
.chip-pin{position:absolute;top:4px;right:5px;font-size:.65rem}

/* ── Player rows ── */
.prow{display:flex;gap:6px;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:8px 11px;margin-bottom:6px;flex-wrap:wrap}
.pbtn{background:transparent;border:1px solid var(--border);border-radius:6px;padding:3px 7px;cursor:pointer;font-size:.7rem;color:var(--text-muted);transition:all .2s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.pbtn:hover{border-color:var(--green);color:var(--green)}
.pbtn.active-court{border-color:var(--gold);color:var(--gold);background:var(--gold-pale)}
.pbtn.active-singles{border-color:var(--orange);color:var(--orange);background:#fff8f0}
.dbtn{background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:1.1rem;padding:0 2px}.dbtn:hover{color:var(--red)}

/* ── Info box ── */
.ibox{background:var(--green-subtle);border:1px solid #c0d8c8;border-radius:8px;padding:11px;font-size:.75rem;color:var(--text-mid);line-height:1.75;margin-top:10px}

/* ── Layout options ── */
.layout-opts{display:flex;flex-direction:column;gap:6px;margin:10px 0}
.lopt{background:var(--surface2);border:2px solid var(--border);border-radius:10px;padding:11px 14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:space-between;gap:10px}
.lopt:hover{border-color:var(--border-strong)}
.lopt.sel{border-color:var(--green);background:var(--green-subtle)}
.lopt-label{font-size:.9rem;font-weight:600;color:var(--text)}
.lopt-sub{font-size:.7rem;color:var(--text-muted);margin-top:2px}

/* ── Format badges ── */
.fbadge{font-size:.62rem;padding:2px 7px;border-radius:10px;font-weight:600}
.fd{background:#e8f0f8;color:var(--blue);border:1px solid #c0d0e8}
.fs{background:#fff3e8;color:var(--orange);border:1px solid #f0d0b0}

/* ── Court cards ── */
.ccard{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px;box-shadow:var(--shadow)}
.chdr{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:var(--green);border-bottom:1px solid var(--border)}
.cname{font-family:'Bebas Neue',sans-serif;letter-spacing:2px;color:#ffffff;font-size:.95rem;display:flex;align-items:center;gap:6px}
.toss-badge{font-size:.62rem;background:rgba(255,255,255,.15);color:rgba(255,255,255,.85);padding:2px 8px;border-radius:20px;border:1px solid rgba(255,255,255,.2)}
.tgrid{display:grid;grid-template-columns:1fr auto 1fr;gap:6px;padding:12px 14px;align-items:center}
.team{display:flex;flex-direction:column;gap:3px}.team.r{text-align:right}
.pname{font-weight:600;font-size:.9rem;color:var(--text)}.pwtn{font-size:.65rem;color:var(--text-muted)}
.vs-txt{text-align:center;font-family:'Bebas Neue',sans-serif;color:var(--text-muted);font-size:1.1rem}
.score-row{display:flex;align-items:center;gap:8px;padding:9px 14px;border-top:1px solid var(--border);background:var(--surface2);flex-wrap:wrap}
.sinp{width:52px;text-align:center;font-size:1.1rem;font-weight:700;padding:6px}
.sdash{color:var(--text-muted);font-size:1.2rem;font-weight:700}
.conf-badge{font-size:.72rem;background:var(--green-subtle);color:var(--green);padding:3px 8px;border-radius:20px;border:1px solid #b0d0bc}
.win-badge{font-size:.65rem;padding:3px 8px;border-radius:10px;font-weight:700;margin-top:3px;display:inline-block}
.win1{background:#e8f0f8;color:var(--blue);border:1px solid #c0d0e8}
.win2{background:#f0e8f8;color:#6a2a9a;border:1px solid #d0b8e8}

/* ── Standings table ── */
.stbl{width:100%;border-collapse:collapse}
.stbl th{font-size:.62rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);padding:7px 8px;text-align:left;border-bottom:2px solid var(--border);background:var(--surface2)}
.stbl td{padding:9px 8px;border-bottom:1px solid var(--border);font-size:.85rem}
.stbl tr:last-child td{border-bottom:none}
.stbl tr:hover td{background:var(--green-subtle)}
.rank{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--text-muted)}
.r1 .rank{color:var(--gold)}.r2 .rank{color:#888}.r3 .rank{color:#b87040}
.r1 td{background:#fffdf0}.r2 td{background:#fafafa}.r3 td{background:#fdf8f4}
.dp{color:var(--green);font-weight:600}.dn{color:var(--red)}

/* ── Timer ── */
.tmr{font-family:monospace;font-variant-numeric:tabular-nums;font-size:1.05rem;font-weight:700}
.tmr.ok{color:var(--green)}.tmr.warn{color:var(--gold)}.tmr.urgent{color:var(--red)}

/* ── Timeline ── */
.tline{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px}
.tlrow{display:flex;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:.8rem}
.tlrow:last-child{border-bottom:none}
.tlt{font-family:monospace;color:var(--green);min-width:46px;font-size:.75rem}
.tlb{font-size:.63rem;padding:2px 6px;border-radius:10px;background:var(--green-subtle);color:var(--green);border:1px solid #b0d0bc}

/* ── Tags ── */
.ptag{display:inline-flex;align-items:center;gap:5px;background:var(--green-subtle);border:1px solid #b0d0bc;border-radius:20px;padding:3px 9px;font-size:.72rem;color:var(--green);margin:3px}
.ptag button{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;line-height:1}

/* ── Stats grid ── */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:12px}
.sbox{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px;text-align:center}
.sv{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--green)}
.sl{font-size:.63rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* ── Bar charts ── */
.brow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.blbl{font-size:.78rem;min-width:110px;color:var(--text-mid)}
.btrack{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.bfill{height:100%;background:var(--green);border-radius:4px;transition:width .4s}
.bval{font-size:.72rem;color:var(--text-muted);min-width:55px;text-align:right}

/* ── H2H table ── */
.h2tbl{width:100%;border-collapse:collapse}
.h2tbl th{font-size:.62rem;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);padding:5px 7px;border-bottom:2px solid var(--border);background:var(--surface2)}
.h2tbl td{padding:7px;border-bottom:1px solid var(--border);font-size:.82rem}

/* ── Wide rows ── */
.wrow{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border)}
.wrow:last-child{border-bottom:none}

/* ── Match results ── */
.match-result{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:.82rem;flex-wrap:wrap;gap:4px}
.match-result:last-child{border-bottom:none}
.match-teams{flex:1;min-width:180px}
.match-score{font-family:monospace;font-weight:700;font-size:1rem;flex-shrink:0}
.score-win{color:var(--green)}.score-loss{color:var(--text-muted)}

/* ── Empty state ── */
.empty{text-align:center;padding:30px;color:var(--text-muted);font-size:.85rem}

/* ── Misc ── */
.rlink{font-size:.65rem;color:var(--blue);text-decoration:none;padding:2px 6px;border:1px solid #c0d0e8;border-radius:6px;background:#e8f0f8}
.rlink:hover{border-color:var(--blue)}
.cfbox{background:var(--red-pale);border:1px solid #e8c5c0;border-radius:8px;padding:10px;margin-bottom:10px;font-size:.8rem;color:var(--red)}
.shdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.sess-label{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:3px;color:var(--text)}
.tabbar{display:flex;gap:3px;background:var(--surface2);border-radius:10px;padding:3px;margin-bottom:14px;overflow-x:auto;border:1px solid var(--border)}
.tabbar button{flex:1;min-width:80px;padding:7px 4px;border:none;background:transparent;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:.78rem;border-radius:7px;cursor:pointer;transition:all .2s}
.tabbar button.on{background:var(--green);color:#fff;font-weight:600}

/* ── Momentum Badges ── */
.mbadge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px 3px 5px;border-radius:20px;font-size:.65rem;font-weight:700;letter-spacing:.8px;white-space:nowrap;line-height:1}
.mbadge svg{flex-shrink:0}
.mb-hot{background:#fff0e0;color:#c94a00;border:1px solid #f5c89a}
.mb-improving{background:#e4f5ec;color:#1a6b3c;border:1px solid #a3d9b8}
.mb-steady{background:#f0f2f0;color:#4a5648;border:1px solid #c8d0c5}
.mb-cooling{background:#fff5e8;color:#9b4f00;border:1px solid #f0c080}
.mb-slump{background:#eaf0f8;color:#1a4a7a;border:1px solid #9ab8d8}
.mbadge-lg{padding:5px 12px 5px 8px;font-size:.75rem}
.mbadge-lg svg{width:18px;height:18px}
@media(max-width:600px){.main{padding:12px}.chip-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}}

/* ── Share Card Modal ── */
.sc-overlay{position:fixed;inset:0;background:rgba(10,20,10,.72);z-index:900;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)}
.sc-modal{background:#fff;border-radius:18px;max-width:420px;width:100%;box-shadow:0 24px 80px rgba(0,0,0,.35);overflow:hidden;max-height:92vh;display:flex;flex-direction:column}
.sc-modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #e8ede6;flex-shrink:0}
.sc-modal-head-title{font-family:'Bebas Neue',sans-serif;letter-spacing:3px;font-size:1rem;color:var(--green)}
.sc-close{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--text-muted);line-height:1;padding:2px 6px}
.sc-modal-body{overflow-y:auto;padding:16px}
.sc-actions{display:flex;gap:8px;padding:14px 16px;border-top:1px solid #e8ede6;flex-shrink:0}

/* ── The renderable card (shown inside modal AND used for share) ── */
#share-card-root{font-family:'DM Sans',sans-serif}
.scard{background:linear-gradient(145deg,#0f3d22 0%,#1a5c38 55%,#0d2e18 100%);border-radius:14px;padding:22px 20px 18px;color:#fff;position:relative;overflow:hidden}
.scard::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");opacity:1}
.scard-logo{font-family:'Bebas Neue',sans-serif;font-size:.7rem;letter-spacing:5px;color:rgba(255,255,255,.45);margin-bottom:14px;text-transform:uppercase}
.scard-event{font-family:'Bebas Neue',sans-serif;font-size:1.55rem;letter-spacing:3px;color:#fff;line-height:1.1;margin-bottom:3px}
.scard-meta{font-size:.68rem;color:rgba(255,255,255,.5);margin-bottom:16px;letter-spacing:.5px}
.scard-divider{height:1px;background:rgba(255,255,255,.12);margin:14px 0}
.scard-section-label{font-size:.58rem;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.4);margin-bottom:8px}
.scard-mvp{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.35);border-radius:10px;padding:10px 12px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.scard-mvp-icon{font-size:1.4rem;flex-shrink:0}
.scard-mvp-name{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;color:#e8c96a}
.scard-mvp-sub{font-size:.65rem;color:rgba(255,255,255,.55);margin-top:1px}
.scard-standings{display:flex;flex-direction:column;gap:4px}
.scard-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;background:rgba(255,255,255,.05)}
.scard-row:first-child{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.2)}
.scard-rank{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:rgba(255,255,255,.35);width:18px;flex-shrink:0}
.scard-row:first-child .scard-rank{color:#e8c96a}
.scard-pname{flex:1;font-size:.82rem;font-weight:600;color:#fff}
.scard-record{font-family:'Bebas Neue',sans-serif;font-size:.95rem;color:rgba(255,255,255,.7);letter-spacing:1px}
.scard-vse{font-size:.7rem;font-weight:700;min-width:36px;text-align:right}
.scard-footer{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:10px;border-top:1px solid rgba(255,255,255,.1)}
.scard-footer-brand{font-size:.6rem;color:rgba(255,255,255,.3);letter-spacing:2px;text-transform:uppercase}
.scard-courts{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:2px}
.scard-court{background:rgba(255,255,255,.06);border-radius:7px;padding:6px 8px;font-size:.68rem}
.scard-court-hdr{font-size:.58rem;color:rgba(255,255,255,.35);margin-bottom:3px;letter-spacing:.5px}
.scard-court-match{color:rgba(255,255,255,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scard-court-score{font-family:monospace;font-weight:700;font-size:.82rem;margin-top:2px}
.scard-court-score .w{color:#6dd99a}.scard-court-score .l{color:rgba(255,255,255,.35)}
.scard-highlight{background:rgba(255,107,53,.12);border:1px solid rgba(255,107,53,.3);border-radius:10px;padding:10px 12px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px}
.scard-highlight-icon{font-size:1.2rem;flex-shrink:0;line-height:1.3}
.scard-highlight-title{font-family:'Bebas Neue',sans-serif;font-size:.88rem;letter-spacing:1.5px;color:#ff8c5a;margin-bottom:2px}
.scard-highlight-detail{font-size:.68rem;color:rgba(255,255,255,.6);line-height:1.5}
.scard-col-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.scard-col-hdr-label{font-size:.55rem;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.3)}
.scard-col-hdr-vse{font-size:.55rem;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.3);margin-left:auto;min-width:44px;text-align:right}

/* ── Partner Trials ── */
.trial-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:.75rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text-mid);transition:all .15s;user-select:none}
.trial-chip.focal{background:rgba(26,92,56,.18);border-color:var(--green);color:var(--green)}

// Returns {val, tag} for the best (lowest) WTN with its format designator.
// If only one type exists, returns that. If both, returns the lower + its tag.
function bestWtnInfo(p){
  const s=parseFloat(p.wtnS),d=parseFloat(p.wtnD);
  const hasS=!isNaN(s)&&s>0,hasD=!isNaN(d)&&d>0;
  if(hasS&&hasD) return s<=d?{val:s,tag:'-S'}:{val:d,tag:'-D'};
  if(hasS) return{val:s,tag:'-S'};
  if(hasD) return{val:d,tag:'-D'};
  const g=parseFloat(p.wtn);
  return(!isNaN(g)&&g>0)?{val:g,tag:''}:null;
}
// Short display string e.g. "21.5-S"
function bestWtnStr(p){const b=bestWtnInfo(p);return b?b.val.toFixed(1)+b.tag:null;}
// Context-aware WTN for court display — shows D rating for doubles, S for singles
// Returns {str, note} where note is a warning if falling back to wrong type
function courtWtnStr(p, isDoubles){
  const s=parseFloat(p.wtnS),d=parseFloat(p.wtnD);
  const hasS=!isNaN(s)&&s>0,hasD=!isNaN(d)&&d>0;
  if(isDoubles){
    if(hasD) return{str:d.toFixed(1)+'-D',note:null};
    if(hasS) return{str:s.toFixed(1)+'-S',note:'singles only'};
  } else {
    if(hasS) return{str:s.toFixed(1)+'-S',note:null};
    if(hasD) return{str:d.toFixed(1)+'-D',note:'doubles only'};
  }
  const g=parseFloat(p.wtn);
  return(!isNaN(g)&&g>0)?{str:g.toFixed(1),note:null}:{str:null,note:null};
}

function wtnTooltip(p){

  if(!parts.length&&p.wtn) parts.push('WTN: '+parseFloat(p.wtn).toFixed(1));
  return parts.join(' · ');
}

// Layout calculator - returns all valid combos for N players on C courts
function calcLayouts(n,c){
  if(n<2||c<1)return[];
  const opts=[];
  for(let d=0;d<=Math.floor(n/4);d++){
    for(let s=0;s<=Math.floor(n/2);s++){
      if(d+s===0||d+s!==c)continue;
      const used=d*4+s*2;
      if(used>n)continue;
      const byes=n-used;
      const parts=[];
      if(d>0)parts.push(`${d} Doubles${d>1?' courts':' court'}`);
      if(s>0)parts.push(`${s} Singles${s>1?' courts':' court'}`);
      opts.push({dC:d,sC:s,label:parts.join(' + '),sub:`${used} players active${byes>0?`, ${byes} sit out`:' - everyone plays'}`,playersUsed:used,byes});
    }
  }
  opts.sort((a,b)=>{
    const af=a.byes===0?1:0,bf=b.byes===0?1:0;
    if(bf!==af)return bf-af;
    if(b.playersUsed!==a.playersUsed)return b.playersUsed-a.playersUsed;
    return b.dC-a.dC;
  });
  return opts;
}

// Canonical matchup key — order-independent, works for 2v2 or 1v1
// Canonical matchup key — order-independent
function matchupKey(t1,t2){
  const ids=a=>(a||[]).filter(Boolean).map(p=>p.id).sort().join(',');
  const k1=ids(t1),k2=ids(t2);
  return k1<k2?k1+'|'+k2:k2+'|'+k1;
}
function hadMatchup(t1,t2,matchupHist){
  if(!matchupHist||!matchupHist.length) return false;
  const k=matchupKey(t1,t2);
  return matchupHist.some(s=>s.has(k));
}

function genPairings({players,locked,bal,hist,matchupHist,courtIds,dC,sC}){
  // ── Court-pinned players
  const pinnedByCourtId={};
  players.filter(p=>p.courtLocked&&p.lockedCourtId).forEach(p=>{
    const cid=p.lockedCourtId.trim();
    if(!pinnedByCourtId[cid])pinnedByCourtId[cid]=[];
    pinnedByCourtId[cid].push(p);
  });
  const pinnedIds=new Set(players.filter(p=>p.courtLocked&&p.lockedCourtId).map(p=>p.id));

  // ── Locked pairs — pull out of free pool (coerce IDs to int for safe comparison)
  const lids=new Set(locked.flatMap(p=>p).map(id=>parseInt(id)));
  const lkd=locked.map(pr=>pr.map(id=>players.find(p=>p.id===parseInt(id))).filter(Boolean)).filter(p=>p.length===2);

  // ── Build free pairs from remaining players, avoiding repeat partners
  let free=shuf(players.filter(p=>!lids.has(parseInt(p.id))&&!pinnedIds.has(p.id)));
  const haswtn=players.some(p=>parseFloat(p.wtn));
  if(haswtn&&bal!=='random') free.sort((a,b)=>(parseFloat(a.wtn)||30)-(parseFloat(b.wtn)||30));
  const freeP=[],tmp=[...free];
  while(tmp.length>=2){
    const p1=tmp.shift(); let bi=0;
    for(let i=0;i<tmp.length;i++){
      if(!hist.some(h=>h[p1.id]===tmp[i].id||h[tmp[i].id]===p1.id)){bi=i;break;}
    }
    freeP.push([p1,...tmp.splice(bi,1)]);
  }
  const singletons=[...tmp];

  // ── Sort free pairs by WTN for balance
  let sortedFree=[...freeP];
  if(haswtn&&bal!=='random'&&sortedFree.length>=2){
    sortedFree.sort((a,b)=>{const avg=x=>x.reduce((s,p)=>s+(parseFloat(p&&p.wtn)||30),0)/x.length;return avg(a)-avg(b);});
    if(bal==='spread'){const r=[];let lo=0,hi=sortedFree.length-1;while(lo<=hi){r.push(sortedFree[lo++]);if(lo<=hi)r.push(sortedFree[hi--]);}sortedFree=r;}
  }

  // ── Interleave locked pairs with free pairs so locked pairs NEVER sit adjacent
  // locked at even slots [0,2,4...], free at odd slots [1,3,5...]
  // This prevents two locked pairs from facing each other
  const pool=[];
  const lQ=[...lkd], fQ=[...sortedFree];
  while(lQ.length||fQ.length){
    if(lQ.length) pool.push(lQ.shift());
    if(fQ.length) pool.push(fQ.shift());
  }

  // ── Build doubles courts
  const courts=[];
  let remaining=[...pool];

  for(let i=0;i<dC&&remaining.length>=2;i++){
    const cid=courtIds[i]||String(i+1);
    const pinned=pinnedByCourtId[cid]||[];
    let team1,team2;

    if(pinned.length>=2){
      team1=[pinned[0],pinned[1]];
      team2=remaining.shift()||[];
    } else if(pinned.length===1){
      const partner=remaining.shift()||[];
      team1=[pinned[0],(partner[1]||partner[0])].filter(Boolean);
      team2=remaining.shift()||[];
    } else {
      team1=remaining.shift();
      // Find best opponent — prefer no prior matchup
      let oppIdx=0;
      for(let j=0;j<remaining.length;j++){
        if(!hadMatchup(team1,remaining[j],matchupHist)){oppIdx=j;break;}
      }
      if(oppIdx>0) remaining.splice(0,0,...remaining.splice(oppIdx,1));
      team2=remaining.shift();
    }
    courts.push({courtId:cid,fmt:'doubles',team1:team1||[],team2:team2||[],toss:Math.floor(Math.random()*2)});
  }

  // ── Singles courts
  const sp=[];
  remaining.forEach(pr=>(pr||[]).filter(Boolean).forEach(p=>sp.push(p)));
  sp.push(...singletons);
  for(let i=0;i<sC&&sp.length>=2;i++){
    const cid=courtIds[dC+i]||String(dC+i+1);
    const pinned=pinnedByCourtId[cid]||[];
    const t1=pinned.length>=1?[pinned[0]]:[sp.shift()];
    const t2=pinned.length>=2?[pinned[1]]:[sp.shift()];
    courts.push({courtId:cid,fmt:'singles',team1:t1,team2:t2,toss:Math.floor(Math.random()*2)});
  }
  return courts;
}

}

  }).forEach(h=>{
    const v1=parseInt(h.score1),v2=parseInt(h.score2),win=v1>v2?1:v2>v1?2:0;
    [[h.team1,h.team2,1],[h.team2,h.team1,2]].forEach(([myT,oppT,side])=>{
      myT.forEach(p=>{
        if(!playerStats[p.id]) return;
        const ps=playerStats[p.id]; ps.matches++;
        const gw=side===1?v1:v2, gl=side===1?v2:v1;
        ps.gameWins+=gw; ps.gameLosses+=gl;
        if(win===side) ps.wins++; else if(win!==0) ps.losses++;
        myT.filter(x=>x.id!==p.id).forEach(partner=>{
          if(!ps.partners[partner.name]) ps.partners[partner.name]={w:0,t:0};
          ps.partners[partner.name].t++;
          if(win===side) ps.partners[partner.name].w++;
        });
        oppT.forEach(opp=>{
          if(!ps.opponents[opp.name]) ps.opponents[opp.name]={w:0,t:0};
          ps.opponents[opp.name].t++;
          if(win===side) ps.opponents[opp.name].w++;
        });
      });
    });
  });
  const payload={
    exportedAt:new Date().toISOString(),
    appVersion:'HELIX Squads — Play Smarter. Win More.',
    players:S.roster.filter(p=>!p.sandbox),
    matchHistory:S.history.filter(h=>{const all=[...h.team1,...h.team2];return !all.some(p=>{const rp=S.roster.find(r=>r.id===p.id);return rp&&rp.sandbox;})}),
    playerAnalytics:Object.values(playerStats)
  };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='helix-tennis-export-'+today()+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  return true;
}

function getMomentumState(pid, history, roster, range){
  if(!history||!history.length||!range) return null;
  const mm=history.filter(h=>[...h.team1,...h.team2].some(p=>p.id===pid));
  if(mm.length<2) return null;
  const last5=mm.slice(-5);
  const isW=h=>{const t1=h.team1.some(p=>p.id===pid);return t1?h.score1>h.score2:h.score2>h.score1;};
  const {exp:expW,tot:expTot}=calcExpectedWins(pid,last5,roster,range);
  if(expTot<1) return null;
  const actual=last5.filter(isW).length;
  const diff=expTot>0?(actual-expW)/expTot:0;
  if(diff>0.25) return {icon:'🔥',label:'HOT',color:'#e05a00',bg:'#fff3e8',diff};
  if(diff>0.08) return {icon:'📈',label:'IMPROVING',color:'#1a6b3c',bg:'#e8f7ee',diff};
  if(diff>=-0.08) return {icon:'➡️',label:'STEADY',color:'#4a5648',bg:'#f2f4f1',diff};
  if(diff>=-0.25) return {icon:'📉',label:'COOLING',color:'#b85c00',bg:'#fff8f0',diff};
  return {icon:'❄️',label:'SLUMP',color:'#1a4a7a',bg:'#eef4fb',diff};
}

function getVsExpected(pid, history, roster, range){
  if(!history||!history.length||!range) return null;
  const mm=history.filter(h=>[...h.team1,...h.team2].some(p=>p.id===pid));
  if(!mm.length) return null;
  const isW=h=>{const t1=h.team1.some(p=>p.id===pid);return t1?h.score1>h.score2:h.score2>h.score1;};
  const {exp:expW,tot:expTot}=calcExpectedWins(pid,mm,roster,range);
  if(expTot<2) return null;
  const actual=mm.filter(isW).length;
  const pct=Math.round((actual-expW)/expTot*100);
  return {pct,actual,expW:Math.round(expW*10)/10,total:expTot,wins:actual,losses:mm.length-actual,matches:mm.length};
}

function getBestPartners(pid, history){
  const ps={};
  (history||[]).filter(h=>[...h.team1,...h.team2].some(p=>p.id===pid)).forEach(h=>{
    const ot1=h.team1.some(p=>p.id===pid),mt=ot1?h.team1:h.team2;
    const won=ot1?h.score1>h.score2:h.score2>h.score1;
    mt.filter(p=>p.id!==pid).forEach(p=>{
      if(!ps[p.id])ps[p.id]={name:p.name,w:0,t:0};
      ps[p.id].t++;if(won)ps[p.id].w++;
    });
  });
  return Object.values(ps).filter(p=>p.t>=2).sort((a,b)=>(b.w/b.t)-(a.w/a.t)).slice(0,3);
}

function getSeasonArc(pid, history, roster, range){
  if(!history||history.length<3||!range) return [];
  const mm=history.filter(h=>[...h.team1,...h.team2].some(p=>p.id===pid));
  if(mm.length<3) return [];
  // Group by week (approximate by slicing into chunks of 3-4 matches)
  const chunkSize=Math.max(2,Math.floor(mm.length/6));
  const isW=h=>{const t1=h.team1.some(p=>p.id===pid);return t1?h.score1>h.score2:h.score2>h.score1;};
  const arc=[];
  for(let i=0;i<mm.length;i+=chunkSize){
    const chunk=mm.slice(i,i+chunkSize);
    const {exp:expW,tot:expTot}=calcExpectedWins(pid,chunk,roster,range);
    if(expTot<1) continue;
    const actual=chunk.filter(isW).length;
    const pct=Math.round((actual-expW)/expTot*100);
    arc.push({label:'M'+(i+1)+'-'+(Math.min(i+chunkSize,mm.length)),pct,actual,exp:Math.round(expW*10)/10,tot:expTot});
  }
  return arc;
}

function sharePlayerDNA(pid){
  const player=S.roster.find(p=>p.id===pid);if(!player)return;
  const range=groupWtnRange(S.roster,S.roster.map(p=>p.id));
  const mm=S.history.filter(h=>[...h.team1,...h.team2].some(p=>p.id===pid));
  const isW=h=>{const t1=h.team1.some(p=>p.id===pid);return t1?h.score1>h.score2:h.score2>h.score1;};
  const wins=mm.filter(isW).length;
  const mom=getMomentumState(pid,S.history,S.roster,range);
  const vse=getVsExpected(pid,S.history,S.roster,range);
  const partners=getBestPartners(pid,S.history);
  const best=partners[0];
  let txt=`🎾 HELIX | SQUADS — PlayerDNA\n`;
  txt+=`━━━━━━━━━━━━━━━━━━━━━\n`;
  txt+=`${player.name.toUpperCase()}\n`;
  if(player.wtn) txt+=`WTN: ${player.wtn}\n`;
  if(mm.length) txt+=`Record: ${wins}–${mm.length-wins} (${mm.length} matches)\n`;
  if(mom) txt+=`Momentum: ${mom.label}\n`;
  if(vse) txt+=`vs Expected: ${vse.pct>0?'+':''}${vse.pct}% ${vse.pct>0?'— Punching above rating!':vse.pct<0?'— Below expected':'— On target'}\n`;
  if(best) txt+=`Best partner: ${best.name} (${Math.round(best.w/best.t*100)}% together)\n`;
  txt+=`━━━━━━━━━━━━━━━━━━━━━\n`;
  txt+=`Play Smarter. Win More. — helixsquads.com`;
  if(navigator.share){navigator.share({title:'My PlayerDNA Card',text:txt}).catch(()=>{});}
  else{navigator.clipboard.writeText(txt).then(()=>alert('PlayerDNA snapshot copied! Paste it in your group chat 🎾')).catch(()=>alert(txt));}
}

// ── Role constants
const ROLES={CAPTAIN:'captain',COCAPTAIN:'cocaptain',ORGANIZER:'organizer',PLAYER:'player'};
const ROLE_LABELS={captain:'Captain ⭐',cocaptain:'Co-Captain ⭐',organizer:'Organizer',player:'Player'};
const ROLE_ICONS={captain:'⭐',cocaptain:'⭐',organizer:'👁',player:'🎾'};

function getPlayerTeams(pid){
  // Returns all teams this player is a member of
  return (S.teams||[]).filter(t=>(t.members||[]).some(m=>m.pid===pid));
}

function getPlayerRole(pid, teamId){
  const team=(S.teams||[]).find(t=>t.id===teamId);
  if(!team) return null;
  const m=(team.members||[]).find(m=>m.pid===pid);
  return m?m.role:null;
}

function getActiveTeam(){
  // Returns the team marked as active, or first team if only one
  const teams=S.teams||[];
  if(!teams.length) return null;
  return teams.find(t=>t.active)||teams[0];
}

function getActiveTeamPlayerIds(){
  const t=getActiveTeam();
  if(!t) return null;
  return (t.members||[]).map(m=>m.pid);
}

function isCapOrOrg(pid, teamId){
  const r=getPlayerRole(pid,teamId);
  return r===ROLES.CAPTAIN||r===ROLES.COCAPTAIN||r===ROLES.ORGANIZER;
}

// ── Bulk Import Engine ────────────────────────────────────────────────────────
function parseCsvRow(line){
  // Handle quoted fields, comma or tab separated
  const sep=line.includes('\t')?'\t':',';
  const parts=[];
  let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===sep&&!inQ){parts.push(cur.trim());cur='';}
    else cur+=c;
  }
  parts.push(cur.trim());
  return parts;
}

function levenshtein(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function findSimilar(name, roster){
  const nl=name.toLowerCase();
  // Exact or case-insensitive
  const exact=roster.find(p=>p.name.toLowerCase()===nl);
  if(exact) return {match:exact,type:'exact'};
  // Check for fuzzy: within edit distance 3 or first/last name subset
  for(const p of roster){
    const pl=p.name.toLowerCase();
    const dist=levenshtein(nl,pl);
    const threshold=Math.max(2,Math.floor(Math.max(nl.length,pl.length)*0.25));
    if(dist<=threshold) return {match:p,type:'fuzzy',dist};
    // Last name match
    const inParts=nl.split(' '),exParts=pl.split(' ');
    if(inParts.length&&exParts.length&&inParts[inParts.length-1]===exParts[exParts.length-1]
       &&(inParts[0][0]===exParts[0][0])) return {match:p,type:'fuzzy',dist:1};
  }
  return null;
}

function parseBulkImport(){
  const raw=($('bulk-paste')||{}).value||'';
  const preview=$('bulk-preview');
  if(!preview) return;
  if(!raw.trim()){preview.innerHTML='<div style="font-size:.75rem;color:var(--text-muted)">Paste some data above first.</div>';return;}

  const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
  const parsed=[];

  // Header detection — skip if first row has no numeric WTN
  let startIdx=0;
  const firstParts=parseCsvRow(lines[0]);
  const firstWtn=firstParts[1]?parseFloat(firstParts[1]):NaN;
  const looksLikeHeader=isNaN(firstWtn)&&firstParts[0]&&!/\d/.test(firstParts[0].replace(/[.,]/g,''));
  if(looksLikeHeader) startIdx=1;

  for(let i=startIdx;i<lines.length;i++){
    const parts=parseCsvRow(lines[i]);
    if(!parts[0]) continue;
    const name=parts[0].replace(/^["']|["']$/g,'').trim();
    if(!name) continue;
    const wtnSRaw=parts[1]?parts[1].replace(/[^0-9.]/g,'').trim():'';
    const wtnDRaw=parts[2]?parts[2].replace(/[^0-9.]/g,'').trim():'';
    const wtnS=wtnSRaw&&!isNaN(parseFloat(wtnSRaw))?parseFloat(wtnSRaw).toFixed(2):'';
    const wtnD=wtnDRaw&&!isNaN(parseFloat(wtnDRaw))?parseFloat(wtnDRaw).toFixed(2):'';
    const wtn=wtnS||wtnD||''; // singles preferred as primary fallback
    const similar=findSimilar(name,S.roster);
    let status,statusLabel,statusColor,checked=true;
    if(similar&&similar.type==='exact'){
      status='duplicate';statusLabel='Already in squad';statusColor='#888';checked=false;
    } else if(similar&&similar.type==='fuzzy'){
      status='fuzzy';statusLabel=`Similar to "${similar.match.name}"`;statusColor='#b85c00';checked=false;
    } else {
      status='new';statusLabel='New player';statusColor='var(--green)';checked=true;
    }
    parsed.push({name,wtn,wtnS,wtnD,status,statusLabel,statusColor,checked,similarName:similar?similar.match.name:null});
  }

  if(!parsed.length){preview.innerHTML='<div style="font-size:.75rem;color:var(--red)">No valid rows found. Check format: Name, WTN Singles, WTN Doubles</div>';return;}

  const newCount=parsed.filter(p=>p.status==='new').length;
  const dupeCount=parsed.filter(p=>p.status==='duplicate').length;
  const fuzzyCount=parsed.filter(p=>p.status==='fuzzy').length;

  let html=`<div style="font-size:.7rem;color:var(--text-muted);margin-bottom:8px;display:flex;gap:12px;flex-wrap:wrap;">
    <span style="color:var(--green);font-weight:600">✓ ${newCount} new</span>
    ${fuzzyCount?`<span style="color:#b85c00;font-weight:600">⚠ ${fuzzyCount} review</span>`:''}
    ${dupeCount?`<span style="color:#888">✗ ${dupeCount} duplicate</span>`:''}
  </div>
  <div style="border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px;">
    <table style="width:100%;border-collapse:collapse;font-size:.78rem;">
      <thead>
        <tr style="background:var(--green);color:#fff;">
          <th style="padding:7px 10px;text-align:left;font-weight:600;width:28px;"></th>
          <th style="padding:7px 10px;text-align:left;font-weight:600;">Name</th>
          <th style="padding:7px 6px;text-align:center;font-weight:600;width:58px;white-space:nowrap;">S WTN</th>
          <th style="padding:7px 6px;text-align:center;font-weight:600;width:58px;white-space:nowrap;">D WTN</th>
          <th style="padding:7px 10px;text-align:left;font-weight:600;">Status</th>
        </tr>
      </thead>
      <tbody id="bulk-rows">`;

  parsed.forEach((p,i)=>{
    const bg=i%2===0?'#fff':'var(--surface2)';
    html+=`<tr style="background:${bg};border-top:1px solid var(--border);">
      <td style="padding:6px 10px;text-align:center;">
        <input type="checkbox" id="bchk-${i}" ${p.checked?'checked':''} ${p.status==='duplicate'?'disabled':''} style="width:14px;height:14px;cursor:pointer;">
      </td>
      <td style="padding:6px 10px;font-weight:500;">${esc(p.name)}</td>
      <td style="padding:6px 6px;text-align:center;color:var(--text-muted);">${p.wtnS||'—'}</td>
      <td style="padding:6px 6px;text-align:center;color:var(--text-muted);">${p.wtnD||'—'}</td>
      <td style="padding:6px 10px;font-size:.7rem;color:${p.statusColor};">
        ${p.status==='fuzzy'?`<span title="Uncheck to skip, check to add anyway">⚠ ${esc(p.statusLabel)}</span>`:p.statusLabel}
      </td>
    </tr>`;
  });

  html+=`</tbody></table></div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
    <button onclick="confirmBulkImport(${JSON.stringify(parsed).replace(/"/g,'&quot;')})" class="btn btn-p btn-sm" id="bulk-confirm-btn">
      ✓ Import Checked Players
    </button>
    <button onclick="toggleAllBulk(true)" style="font-size:.72rem;padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;">Select All</button>
    <button onclick="toggleAllBulk(false)" style="font-size:.72rem;padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;">Clear All</button>
  </div>
  <div id="bulk-result" style="margin-top:8px;font-size:.75rem;min-height:16px;"></div>`;

  preview.innerHTML=html;
  // Re-wire confirm with live checkbox state
  setTimeout(()=>{
    const btn=document.getElementById('bulk-confirm-btn');
    if(btn) btn.onclick=()=>confirmBulkImport(parsed);
  },0);
}

function toggleAllBulk(val){
  const rows=document.querySelectorAll('[id^="bchk-"]');
  rows.forEach(cb=>{if(!cb.disabled)cb.checked=val;});
}

function confirmBulkImport(parsed){
  const checkboxes=document.querySelectorAll('[id^="bchk-"]');
  let added=0;
  checkboxes.forEach((cb,i)=>{
    if(!cb.checked||!parsed[i]) return;
    const p=parsed[i];
    if(p.status==='duplicate') return;
    // Final de-dupe check at import time
    const alreadyIn=S.roster.some(r=>r.name.toLowerCase()===p.name.toLowerCase());
    if(alreadyIn) return;
    S.roster.push({
      id:uid(),
      name:p.name,
      wtn:p.wtn||'',
      wtnS:p.wtnS||'',
      wtnD:p.wtnD||'',
      wtnSource:'WTN',
      courtLocked:false,
      lockedCourtId:'',
      singlesOk:false,
      sandbox:false
    });
    added++;
  });
  saveR();
  const res=document.getElementById('bulk-result');
  if(res) res.innerHTML=`<span style="color:var(--green);font-weight:600">✓ ${added} player${added!==1?'s':''} added to squad</span>`;
  renderSquadList();
  // Auto-close panel after 1.5s
  setTimeout(()=>{
    const panel=$('bulk-import-panel');
    const btn=$('bulk-import-btn');
    if(panel) panel.style.display='none';
    if(btn) btn.textContent='📋 Bulk Import';
  },1500);
}
function renderSquadList(){

      const roleOnActive=activeTeam?getPlayerRole(p.id,activeTeam.id):null;
      return{p,vse,mom,teams:teams2,role:roleOnActive};
    }).filter(x=>x.vse&&x.vse.total>=2).sort((a,b)=>b.vse.pct-a.vse.pct);

    if(lbData.length>=2){

      let lbHtml=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
        <div class="ct" style="margin:0;padding:0;border:none">⚡ vs Expected</div>
        <button onclick="S._lbTeamFilter=S._lbTeamFilter==='team'?'squad':'team';renderSquadList();"
          style="font-size:.68rem;padding:4px 10px;border:1px solid var(--green);border-radius:8px;background:${useTeamFilter?'var(--green)':'transparent'};color:${useTeamFilter?'#fff':'var(--green)'};cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;">

      </div>
      <div style="font-size:.65rem;color:var(--text-muted);margin-bottom:10px">${toggleLabel} · normalized for opponent strength</div>`;
      lbData.forEach((x,i)=>{
        const {p,vse,mom}=x;
        const c=vse.pct>0?'#1a6b3c':vse.pct<0?'#8b1a1a':'#4a5648';
        const medals=['🥇','🥈','🥉'];
        const medal=i<3?medals[i]:'';
        const barW=Math.min(100,Math.max(4,Math.abs(vse.pct)*2));
        const barC=vse.pct>0?'#1a6b3c':'#c0392b';
        lbHtml+=`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);">
          <div style="width:22px;text-align:center;font-size:.85rem">${medal||`<span style="font-size:.7rem;color:var(--text-muted);font-weight:600">${i+1}</span>`}</div>

            <div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;flex-wrap:wrap">
              <span style="font-weight:600;font-size:.85rem">${esc(p.name)}</span>
              ${mom?momentumSVG(mom):''}
              ${(()=>{const _bw=bestWtnStr(p),_tt=wtnTooltip(p);return _bw?`<span title="${esc(_tt)}" style="font-size:.65rem;color:var(--text-muted);background:var(--surface2);padding:1px 5px;border-radius:4px;cursor:default">${esc(_bw)}</span>`:'';})()}             </div>
            <div style="display:flex;align-items:center;gap:6px">
              <div style="flex:1;max-width:100px;background:#e8e8e8;border-radius:3px;height:6px;overflow:hidden">
                <div style="width:${barW}%;height:100%;background:${barC};border-radius:3px;"></div>
              </div>
              <span style="font-size:.68rem;color:var(--text-muted)">${vse.wins}-${vse.losses}</span>
            </div>
          </div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:${c};min-width:44px;text-align:right">${vse.pct>0?'+':''}${vse.pct}%</div>
        </div>`;
      });

      lbC.innerHTML=lbHtml;
    } else {
      lbC.innerHTML='';lbC.style.display='none';
    }
  } else {
    lbC.innerHTML='';lbC.style.display='none';
  }

  // ── Squad player cards
  lw2.innerHTML='';

  const card=mk('div','card');
  card.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)">

  </div>`;

  S.roster.forEach(p=>{
    const mom=getMomentumState(p.id,S.history,S.roster,range);

    const mm=S.history.filter(h=>[...h.team1,...h.team2].some(x=>x.id===p.id));
    const isW=h=>{const t1=h.team1.some(x=>x.id===p.id);return t1?h.score1>h.score2:h.score2>h.score1;};

    avatar.innerHTML=momentumAvatar(mom, p.name.charAt(0).toUpperCase()); avatar.textContent='';

    const info=mk('div');info.style.cssText='flex:1;min-width:0;';

    nameLine.innerHTML=`<span>${esc(p.name)}</span>${p.sandbox?'<span style="font-size:.6rem;background:#888;color:#fff;padding:1px 4px;border-radius:3px">TEST</span>':''}`;

    const wtnIn=mk('input');wtnIn.type='text';wtnIn.value=p.wtn||'';wtnIn.placeholder='WTN';
    wtnIn.style.cssText='width:62px;font-size:.72rem;padding:4px 6px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);';
    wtnIn.onchange=()=>{p.wtn=wtnIn.value.trim();saveR();renderSquadList();};

    const pinBtn=mk('button');
    pinBtn.style.cssText=`padding:4px 6px;border:1px solid var(--border);border-radius:6px;background:${p.courtLocked?'var(--gold-pale)':'var(--surface2)'};font-size:.75rem;cursor:pointer;`;

  lw2.appendChild(card);

}

// ── Predictive analytics helpers ────────────────────────────────────────────
// ── DYNAMIC RELATIVE PREDICTION ENGINE ─────────────────────────────────────
// All predictions are relative to the GROUP's actual WTN spread, not absolute scale.
// Lower WTN = stronger. Combined team WTN is the unit of comparison.

function playerWtn(p, roster, fmt){
  // Pick singles or doubles WTN based on format. Falls back to wtn if specific not set.
  const rp=roster?roster.find(r=>r.id===p.id):null;
  const src=rp||p;
  if(fmt==='singles') return parseFloat(src.wtnS||src.wtn)||null;
  if(fmt==='doubles') return parseFloat(src.wtnD||src.wtn)||null;
  // No format: prefer doubles for doubles-heavy context, else general wtn
  return parseFloat(src.wtnD||src.wtnS||src.wtn)||null;
}

function teamCombinedWtn(team, roster, fmt){
  // Sum of WTN for a team — lower combined = stronger team
  const vals=(team||[]).filter(Boolean).map(p=>playerWtn(p,roster,fmt)).filter(x=>x&&!isNaN(x)&&x>0);
  return vals.length?vals.reduce((a,b)=>a+b,0):null;
}

function teamAvgWtn(team, roster, fmt){
  const vals=(team||[]).filter(Boolean).map(p=>playerWtn(p,roster,fmt)).filter(x=>x&&!isNaN(x)&&x>0);
  return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
}

function groupWtnRange(roster, playerIds){
  // Find min and max WTN among active players to establish group spread
  const wtns=(playerIds||roster.map(p=>p.id))
    .map(id=>roster.find(p=>p.id===id))
    .filter(Boolean)
    .map(p=>parseFloat(p.wtnD||p.wtnS||p.wtn))
    .filter(x=>!isNaN(x)&&x>0);
  if(wtns.length<2) return null;
  return {min:Math.min(...wtns), max:Math.max(...wtns), spread:Math.max(...wtns)-Math.min(...wtns)};
}

function winProbRelative(myTeam, oppTeam, roster, range){
  // Use combined team WTN delta as fraction of group spread
  // range: {min, max, spread} from groupWtnRange
  const myC=teamCombinedWtn(myTeam, roster);
  const oppC=teamCombinedWtn(oppTeam, roster);
  if(myC===null||oppC===null) return null;
  if(!range||range.spread===0) return 0.5;

  // Delta: positive means opponents have higher (weaker) combined WTN = we're favored
  const delta=oppC-myC;
  // Normalize delta to group spread — a full-spread gap = near certain win
  // Scale so that delta/spread of 0.5 (half the group spread difference) ≈ 75% win prob
  // Using logistic: k tuned so normalized delta of 1.0 ≈ 90% win prob
  const normalizedDelta=delta/(range.spread*1.5);
  const k=4.0;
  return 1/(1+Math.exp(-k*normalizedDelta));
}

// ── Match type weights ────────────────────────────────────────────────────────
const MATCH_TYPE_WEIGHTS={
  tournament:1.4, league:1.3, challenge:1.1, squad:1.0, practice:0.8
};

// ── Layer 1: H2H adjustment ───────────────────────────────────────────────────
// Returns probability shift based on head-to-head history between these exact players
function calcH2HAdjustment(team1ids, team2ids, history){
  // Find matches where these exact player combinations faced each other
  const t1set=new Set(team1ids), t2set=new Set(team2ids);
  const relevant=history.filter(h=>{
    const h1ids=h.team1.map(p=>p.id), h2ids=h.team2.map(p=>p.id);
    const match12=team1ids.every(id=>h1ids.includes(id))&&team2ids.every(id=>h2ids.includes(id));
    const match21=team2ids.every(id=>h1ids.includes(id))&&team1ids.every(id=>h2ids.includes(id));
    return match12||match21;
  });
  if(!relevant.length) return 0;

  // Weight recent matches more — exponential decay
  let weightedWins=0, totalWeight=0;
  const now=Date.now();
  relevant.forEach((h,i)=>{
    const age=(now-new Date(h.date).getTime())/(1000*60*60*24*30); // months ago
    const w=(MATCH_TYPE_WEIGHTS[h.matchType]||1.0)*Math.pow(0.8,age);
    const h1ids=h.team1.map(p=>p.id);
    const t1won=h.score1>h.score2;
    const team1wasT1=team1ids.every(id=>h1ids.includes(id));
    const team1won=team1wasT1?t1won:!t1won;
    weightedWins+=team1won?w:0;
    totalWeight+=w;
  });
  if(!totalWeight) return 0;

  const h2hWinRate=weightedWins/totalWeight;
  // Shift is difference from 50% — capped at ±15%
  const shift=(h2hWinRate-0.5)*0.3; // scale so even 100% H2H = +15%
  return Math.max(-0.15, Math.min(0.15, shift));
}

// ── Layer 2: Partnership strength adjustment ──────────────────────────────────
// Adjusts win probability based on how a pairing performs vs WTN expectation
// Requires 3+ matches together before activating
function calcPartnershipAdjustment(teamids, history, roster, range){
  if(teamids.length<2) return 0; // singles — no partnership
  const [pid1,pid2]=teamids;

  // Find all matches where these two played together
  const together=history.filter(h=>{
    const t1ids=h.team1.map(p=>p.id), t2ids=h.team2.map(p=>p.id);
    return (t1ids.includes(pid1)&&t1ids.includes(pid2))||(t2ids.includes(pid1)&&t2ids.includes(pid2));
  });
  if(together.length<3) return 0; // minimum sample size

  // Calculate actual win rate vs expected win rate for this pairing
  let actualWins=0, expectedWins=0, totalWeight=0;
  const now=Date.now();
  together.forEach(h=>{
    const age=(now-new Date(h.date).getTime())/(1000*60*60*24*30);
    const w=(MATCH_TYPE_WEIGHTS[h.matchType]||1.0)*Math.pow(0.85,age);
    const onT1=h.team1.some(p=>p.id===pid1);
    const myTeam=onT1?h.team1:h.team2;
    const oppTeam=onT1?h.team2:h.team1;
    const won=onT1?(h.score1>h.score2):(h.score2>h.score1);
    const prob=winProbRelative(
      myTeam.map(p=>roster.find(r=>r.id===p.id)||p),
      oppTeam.map(p=>roster.find(r=>r.id===p.id)||p),
      roster, range
    );
    if(prob===null) return;
    actualWins+=won?w:0;
    expectedWins+=prob*w;
    totalWeight+=w;
  });
  if(!totalWeight||!expectedWins) return 0;

  const actualRate=actualWins/totalWeight;
  const expectedRate=expectedWins/totalWeight;
  const overPerf=actualRate-expectedRate;

  // Cap at ±12%
  return Math.max(-0.12, Math.min(0.12, overPerf*0.6));
}

// ── Layer 3: Individual effective rating adjustment ───────────────────────────
// Players consistently outperforming WTN get a bonus — requires 5+ matches
function calcEffectiveRatingAdjustment(teamids, history, roster, range){
  let totalAdj=0, count=0;
  teamids.forEach(pid=>{
    const mm=history.filter(h=>[...h.team1,...h.team2].some(p=>p.id===pid));
    if(mm.length<5) return; // minimum 5 matches

    let actualWins=0, expectedWins=0, totalWeight=0;
    const now=Date.now();
    mm.forEach(h=>{
      const age=(now-new Date(h.date).getTime())/(1000*60*60*24*30);
      const w=(MATCH_TYPE_WEIGHTS[h.matchType]||1.0)*Math.pow(0.9,age);
      const onT1=h.team1.some(p=>p.id===pid);
      const myTeam=onT1?h.team1:h.team2;
      const oppTeam=onT1?h.team2:h.team1;
      const won=onT1?(h.score1>h.score2):(h.score2>h.score1);
      const prob=winProbRelative(
        myTeam.map(p=>roster.find(r=>r.id===p.id)||p),
        oppTeam.map(p=>roster.find(r=>r.id===p.id)||p),
        roster, range
      );
      if(prob===null) return;
      actualWins+=won?w:0;
      expectedWins+=prob*w;
      totalWeight+=w;
    });
    if(!totalWeight) return;
    const overPerf=(actualWins/totalWeight)-(expectedWins/totalWeight);
    totalAdj+=overPerf;
    count++;
  });
  if(!count) return 0;
  const avgAdj=totalAdj/count;
  // Cap at ±10%
  return Math.max(-0.10, Math.min(0.10, avgAdj*0.5));
}

// ── Layer 4: Momentum/streak adjustment ──────────────────────────────────────
// Recent form — last 3-5 matches vs expectation. No minimum threshold.
function calcMomentumAdjustment(teamids, history, roster, range){
  const WINDOW=5; // look at last 5 matches per player
  let totalAdj=0, count=0;
  teamids.forEach(pid=>{
    const mm=history
      .filter(h=>[...h.team1,...h.team2].some(p=>p.id===pid))
      .sort((a,b)=>new Date(b.date)-new Date(a.date))
      .slice(0,WINDOW);
    if(!mm.length) return;

    let actualWins=0, expectedWins=0, total=0;
    mm.forEach((h,i)=>{
      // Recent matches weighted more heavily — first match = full weight, older = less
      const w=1/(i+1);
      const onT1=h.team1.some(p=>p.id===pid);
      const myTeam=onT1?h.team1:h.team2;
      const oppTeam=onT1?h.team2:h.team1;
      const won=onT1?(h.score1>h.score2):(h.score2>h.score1);
      const prob=winProbRelative(
        myTeam.map(p=>roster.find(r=>r.id===p.id)||p),
        oppTeam.map(p=>roster.find(r=>r.id===p.id)||p),
        roster, range
      );
      if(prob===null) return;
      actualWins+=won?w:0;
      expectedWins+=prob*w;
      total+=w;
    });
    if(!total) return;
    const overPerf=(actualWins/total)-(expectedWins/total);
    totalAdj+=overPerf;
    count++;
  });
  if(!count) return 0;
  const avgAdj=totalAdj/count;
  // Cap at ±8%
  return Math.max(-0.08, Math.min(0.08, avgAdj*0.8));
}

// ── Momentum label for display ────────────────────────────────────────────────
function getMomentumLabel(playerId, history, roster, range){
  const mm=history
    .filter(h=>[...h.team1,...h.team2].some(p=>p.id===playerId))
    .sort((a,b)=>new Date(b.date)-new Date(a.date))
    .slice(0,5);
  if(!mm.length) return null;
  let over=0, count=0;
  mm.forEach(h=>{
    const onT1=h.team1.some(p=>p.id===playerId);
    const myTeam=onT1?h.team1:h.team2;
    const oppTeam=onT1?h.team2:h.team1;
    const won=onT1?(h.score1>h.score2):(h.score2>h.score1);
    const prob=winProbRelative(
      myTeam.map(p=>roster.find(r=>r.id===p.id)||p),
      oppTeam.map(p=>roster.find(r=>r.id===p.id)||p),
      roster, range
    );
    if(prob===null) return;
    over+=(won?1:0)-prob; count++;
  });
  if(!count) return null;
  const avg=over/count;
  if(avg>0.25) return {icon:'&#128293;',label:'Hot',color:'var(--red)'};
  if(avg>0.08) return {icon:'&#128200;',label:'Form',color:'var(--green)'};
  if(avg<-0.25) return {icon:'&#10052;',label:'Slump',color:'#5b8ee6'};
  if(avg<-0.08) return {icon:'&#128201;',label:'Cold',color:'var(--text-muted)'};
  return {icon:'&#10145;',label:'Steady',color:'var(--text-muted)'};
}

// ── Master learned prediction function ───────────────────────────────────────
// Combines all 4 layers with the base WTN model
function winProbLearned(team1, team2, roster, range, history){
  const base=winProbRelative(team1, team2, roster, range);
  if(base===null) return {prob:null, adjusted:false, layers:{}};
  if(!history||!history.length) return {prob:base, adjusted:false, layers:{}};

  const t1ids=team1.map(p=>p.id).filter(Boolean);
  const t2ids=team2.map(p=>p.id).filter(Boolean);

  const h2h=calcH2HAdjustment(t1ids, t2ids, history);
  const partner1=calcPartnershipAdjustment(t1ids, history, roster, range);
  const partner2=calcPartnershipAdjustment(t2ids, history, roster, range);
  const partnerAdj=partner1-partner2; // team1 benefit minus team2 benefit
  const effRating1=calcEffectiveRatingAdjustment(t1ids, history, roster, range);
  const effRating2=calcEffectiveRatingAdjustment(t2ids, history, roster, range);
  const effAdj=effRating1-effRating2;
  const momentum1=calcMomentumAdjustment(t1ids, history, roster, range);
  const momentum2=calcMomentumAdjustment(t2ids, history, roster, range);
  const momentumAdj=momentum1-momentum2;

  // Total adjustment — cap at ±35%
  const totalAdj=h2h+partnerAdj+effAdj+momentumAdj;
  const cappedAdj=Math.max(-0.35, Math.min(0.35, totalAdj));

  const finalProb=Math.max(0.05, Math.min(0.95, base+cappedAdj));
  const adjusted=Math.abs(cappedAdj)>0.01;

  return {
    prob:finalProb,
    base,
    adjusted,
    layers:{h2h,partner:partnerAdj,effRating:effAdj,momentum:momentumAdj,total:cappedAdj}
  };
}

function predictScore(prob){
  // Map win probability to expected score (games to 21)
  if(prob<0.5) return predictScore(1-prob).split('-').reverse().join('-');
  if(prob<0.52) return '21-21 (TB)';
  const maxG=21;
  // At prob=0.52 → ~21-20, prob=0.65 → ~21-17, prob=0.80 → ~21-13, prob=0.95 → ~21-7
  const oppG=Math.round(maxG*Math.pow(1-prob, 0.7)*1.9);
  return maxG+'-'+Math.max(0,Math.min(oppG,20));
}

function calcSOS(playerId, history, roster, range){
  // Avg combined opponent WTN as percentile within group range
  // Returns {raw, percentile, label, color}
  const matches=history.filter(h=>[...h.team1,...h.team2].some(p=>p.id===playerId));
  if(!matches.length) return null;
  const oppCombineds=[];
  matches.forEach(h=>{
    const onT1=h.team1.some(p=>p.id===playerId);
    const opps=onT1?h.team2:h.team1;
    const teamSize=opps.filter(Boolean).length||1;
    // Use combined WTN of opposing team
    const c=teamCombinedWtn(opps,roster);
    if(c!==null) oppCombineds.push(c/teamSize); // store as avg for display
  });
  if(!oppCombineds.length) return null;
  const avgOppWtn=oppCombineds.reduce((a,b)=>a+b,0)/oppCombineds.length;
  if(!range) return {raw:avgOppWtn, pct:50, label:'Average', color:'var(--g)'};

  // Percentile: lower opp WTN = tougher schedule
  // pct=0 means faced the strongest possible opponents, pct=100 means weakest
  const pct=Math.round(((avgOppWtn-range.min)/(range.spread||1))*100);
  // Clamp 0-100
  const p=Math.max(0,Math.min(100,pct));
  // Label based on percentile of difficulty (lower pct = harder)
  let label,color;
  if(p<=20){label='Elite Draw';color='#ff4444';}
  else if(p<=40){label='Tough';color:'#ff8c42';color='#ff8c42';}
  else if(p<=60){label='Competitive';color='var(--yellow)';}
  else if(p<=80){label='Average';color='var(--g)';}
  else{label='Below Average';color='var(--lime)';}
  return {raw:avgOppWtn, pct:p, label, color};
}

function calcExpectedWins(playerId, history, roster, range){
  let exp=0, tot=0;
  history.filter(h=>[...h.team1,...h.team2].some(p=>p.id===playerId)).forEach(h=>{
    const onT1=h.team1.some(p=>p.id===playerId);
    const myTeam=onT1?h.team1:h.team2;
    const oppTeam=onT1?h.team2:h.team1;
    const prob=winProbRelative(
      myTeam.map(p=>roster.find(r=>r.id===p.id)||p),
      oppTeam.map(p=>roster.find(r=>r.id===p.id)||p),
      roster, range
    );
    if(prob===null) return;
    exp+=prob;
    tot++;
  });
  return {exp:Math.round(exp*10)/10, tot};
}

// ── Match formats ────────────────────────────────────────────────────────────
// ── Match Formats ────────────────────────────────────────────────────────────
// Format properties:
//   label: display name
//   desc: short description
//   sets: number of sets (1 or 3)
//   toWin: games to win a set
//   winBy: win by this many games (1=no-ad style, 2=standard)
//   tbAt: tiebreak triggered at this score each (e.g. 6 means 6-6)
//   tbTo: tiebreak points (7 for standard TB, 10 for super TB)
//   adToggle: whether Ad/No-Ad can be toggled
//   s3type: for best-of-3 — 'supertb'(10pt MTB) | 'fullset' | 'fast4'
//   fast4: true for Fast Four rules (5pt TB at 3-3, sudden death at 4-4)

const MATCH_FORMATS={

    sets:1, toWin:8, winBy:2, tbAt:8, tbTo:7, adToggle:true, ad:true
  },
  'best3-mtb':{
    label:'Best of 3 — Match TB', desc:'Sets 1&2 standard, 1-1 → 10pt super TB',
    sets:3, toWin:6, winBy:2, tbAt:6, tbTo:7, s3type:'supertb', adToggle:true, ad:true
  },
  'best3-full':{

    sets:3, toWin:6, winBy:2, tbAt:6, tbTo:7, s3type:'fullset', adToggle:true, ad:true
  },
  'fast4':{
    label:'Fast Four', desc:'Best of 3, first to 4, 3-3 → 5pt TB, always No-Ad',
    sets:3, toWin:4, winBy:1, tbAt:3, tbTo:5, s3type:'fast4', adToggle:false, fast4:true

// Helper: get effective format (session override > event default)
function getFmt(ev,sess){
  const key=(sess&&sess.matchFormat)||(ev&&ev.matchFormat)||'no-ad';
  const fmt=MATCH_FORMATS[key]||MATCH_FORMATS['no-ad'];
  // Apply ad toggle override if stored on session
  if(sess&&sess.adOverride!==undefined) return Object.assign({},fmt,{ad:sess.adOverride});
  return fmt;
}

// Helper: is this a multi-set format?
function isMultiSet(fmt){ return fmt.sets>1; }

// Helper: max input value for a single set score field
function maxSetScore(fmt){ return fmt.toWin+1; }

// ── Score validation ──────────────────────────────────────────────────────────
// For multi-set formats, validates a single set's score
// Returns {ok, error, isTb, isComplete}
function validateSetScore(s1, s2, fmt){
  const v1=parseInt(s1), v2=parseInt(s2);
  if(isNaN(v1)||isNaN(v2)||s1===''||s2==='') return {ok:false,error:'',isTb:false,isComplete:false};
  const toWin=fmt.toWin, winBy=fmt.winBy, tbAt=fmt.tbAt, tbTo=fmt.tbTo;
  const winner=Math.max(v1,v2), loser=Math.min(v1,v2);
  if(winner>toWin+2||loser<0) return {ok:false,error:'Invalid score',isTb:false,isComplete:false};
  // Tiebreak trigger check
  const isTb=(v1===tbAt&&v2===tbAt);
  if(isTb) return {ok:true,error:'',isTb:true,isComplete:false};
  if(winner<toWin) return {ok:false,error:'Winner needs '+toWin,isTb:false,isComplete:false};
  // Win by 2 check (standard/pro)
  if(winBy===2){
    if(winner===toWin&&loser<=toWin-2) return {ok:true,error:'',isTb:false,isComplete:true};
    if(winner===toWin+1&&loser===toWin) return {ok:true,error:'',isTb:false,isComplete:true}; // e.g. 7-5
    if(loser>toWin-2&&winner===toWin&&loser===toWin-1) return {ok:true,error:'',isTb:false,isComplete:true}; // 6-5
    return {ok:false,error:'Invalid for '+fmt.label,isTb:false,isComplete:false};
  }
  // Win by 1 (no-ad, fast4)
  if(winner===toWin&&loser<=toWin-1) return {ok:true,error:'',isTb:false,isComplete:true};
  return {ok:false,error:'Invalid for '+fmt.label,isTb:false,isComplete:false};
}

// Legacy single-set validateScore wrapper (used by existing court card code)
function validateScore(s1, s2, fmt){
  if(isMultiSet(fmt)){
    // For multi-set, just check each number is 0-3
    const v1=parseInt(s1),v2=parseInt(s2);
    if(isNaN(v1)||isNaN(v2)) return {ok:false,error:'',isTb:false};
    if(v1>3||v2>3) return {ok:false,error:'Max 3 sets',isTb:false};
    const tot=v1+v2;
    if(tot>3) return {ok:false,error:'Max 3 sets total',isTb:false};
    return {ok:true,error:'',isTb:false};
  }
  return validateSetScore(s1,s2,fmt);
}

function maxScore(fmt){ return isMultiSet(fmt)?fmt.sets:fmt.toWin+1; }

// ── Score display helpers ─────────────────────────────────────────────────────
// Format a stored score object for display
function scoreDisplay(sc, fmt){
  if(!sc||!sc.confirmed) return null;
  if(!isMultiSet(fmt)){
    // Single set
    let s=sc.s1+'-'+sc.s2;
    if(sc.tb) s+=' ('+sc.tb+')';
    return s;
  }
  // Multi-set
  if(!sc.sets||!sc.sets.length){
    // Legacy format fallback
    return sc.s1+'-'+sc.s2;
  }
  const parts=sc.sets.map((st,i)=>{
    let p=st.s1+'-'+st.s2;
    if(st.tb) p+='('+st.tb+')';
    return p;
  });
  if(sc.supertb) parts.push('MTB '+sc.supertb.s1+'-'+sc.supertb.s2);
  return parts.join(' ');
}

// Get total games from score for +/- calculation
function totalGames(sc, fmt){
  if(!sc||!sc.confirmed) return {g1:0,g2:0};
  if(!isMultiSet(fmt)||!sc.sets||!sc.sets.length){
    return {g1:parseInt(sc.s1)||0, g2:parseInt(sc.s2)||0};
  }
  let g1=0,g2=0;
  sc.sets.forEach(st=>{g1+=parseInt(st.s1)||0;g2+=parseInt(st.s2)||0;});
  if(sc.supertb){g1+=parseInt(sc.supertb.s1)||0;g2+=parseInt(sc.supertb.s2)||0;}
  return {g1,g2};
}

// Who won from a score object?
function scoreWinner(sc, fmt){
  if(!sc||!sc.confirmed) return 0;
  if(!isMultiSet(fmt)||!sc.sets||!sc.sets.length){
    const v1=parseInt(sc.s1),v2=parseInt(sc.s2);
    return v1>v2?1:v2>v1?2:0;
  }
  // Count sets won
  let s1=0,s2=0;
  sc.sets.forEach(st=>{
    const v1=parseInt(st.s1),v2=parseInt(st.s2);
    if(v1>v2)s1++;else if(v2>v1)s2++;
  });
  if(sc.supertb){
    const v1=parseInt(sc.supertb.s1),v2=parseInt(sc.supertb.s2);
    if(v1>v2)s1++;else if(v2>v1)s2++;
  }
  return s1>s2?1:s2>s1?2:0;
}

// ── Predicted score display ───────────────────────────────────────────────────
function predictSetScore(prob, fmt){
  if(!fmt) return '?';
  if(prob===null||prob===undefined) return '?';
  if(prob<0.5) return predictSetScore(1-prob,fmt).split('-').reverse().join('-');
  if(isMultiSet(fmt)){
    // For multi-set formats, predict set count
    if(prob<0.55) return '2-1';
    if(prob<0.72) return '2-1';
    return '2-0';
  }
  const toWin=fmt.toWin, tbAt=fmt.tbAt;
  if(prob<0.53) return tbAt+'-'+tbAt+' TB';
  const scale=[
    [0.55, toWin+'-'+(tbAt-1)+' TB'],
    [0.63, toWin+'-'+(toWin-1)],
    [0.73, toWin+'-'+(toWin-2)],
    [0.84, toWin+'-'+(toWin-3)],
    [0.93, toWin+'-'+(Math.max(0,toWin-4))],
    [1.01, toWin+'-'+(Math.max(0,toWin-5))],
  ];
  for(const [threshold,score] of scale){ if(prob<threshold) return score; }
  return toWin+'-0';
}

// ── KOTC — King of the Court ─────────────────────────────────────────────────

function kotcIsBackDraw(courtCount){ return courtCount>=6; }
function kotcWinnerCourts(courtCount){ return courtCount>=6?4:courtCount; }
function kotcBackCourts(courtCount){ return courtCount>=6?courtCount-4:0; }

function kotcComputeMovement(round, courtCount){
  // Returns array of {courtNum, pairId, direction} after a round
  const movements=[];
  const wc=kotcWinnerCourts(courtCount);
  const bc=kotcBackCourts(courtCount);
  const isFirstRound=round.roundNum===1;

  round.courts.forEach(c=>{
    const isBack=c.isBackDraw;
    const winner=c.winner; // 'A' or 'B'
    const winPair=winner==='A'?c.pairA:c.pairB;
    const losPair=winner==='A'?c.pairB:c.pairA;
    if(!winPair||!losPair) return;

    if(isBack){
      if(isFirstRound){
        // Back draw winner promotes to bottom of winner draw
        movements.push({pairId:winPair.id, fromCourt:c.courtNum, toCourt:wc, promoted:true});
        movements.push({pairId:losPair.id, fromCourt:c.courtNum, toCourt:c.courtNum, stays:true});
      } else {
        // Back draw plays MUD within its own courts
        if(c.courtNum>wc+1){
          movements.push({pairId:winPair.id, fromCourt:c.courtNum, toCourt:c.courtNum-1});
          movements.push({pairId:losPair.id, fromCourt:c.courtNum, toCourt:c.courtNum});
        } else {
          movements.push({pairId:winPair.id, fromCourt:c.courtNum, toCourt:c.courtNum, crown:true});
          movements.push({pairId:losPair.id, fromCourt:c.courtNum, toCourt:c.courtNum});
        }
      }
    } else {
      // Winner draw MUD movement
      if(c.courtNum===1){
        movements.push({pairId:winPair.id, fromCourt:1, toCourt:1, crown:true});
        movements.push({pairId:losPair.id, fromCourt:1, toCourt:2});
      } else if(c.courtNum===wc){
        movements.push({pairId:winPair.id, fromCourt:c.courtNum, toCourt:c.courtNum-1});
        movements.push({pairId:losPair.id, fromCourt:c.courtNum, toCourt:c.courtNum, stays:true});
      } else {
        movements.push({pairId:winPair.id, fromCourt:c.courtNum, toCourt:c.courtNum-1});
        movements.push({pairId:losPair.id, fromCourt:c.courtNum, toCourt:c.courtNum+1});
      }
    }
  });
  return movements;
}

function kotcBuildNextRound(kotc){
  const lastRound=kotc.rounds[kotc.rounds.length-1];
  const movements=kotcComputeMovement(lastRound, kotc.courtCount);
  // Apply movements (with any captain overrides already baked in)
  const nextCourts=[];
  const courtCount=kotc.courtCount;
  const wc=kotcWinnerCourts(courtCount);
  const bc=kotcBackCourts(courtCount);

  // Build court slots
  for(let i=1;i<=courtCount;i++){
    const isBack=i>wc;
    // Find pairs moving to this court
    const comers=movements.filter(m=>m.toCourt===i);
    const pairA=comers[0]?kotc.pairs.find(p=>p.id===comers[0].pairId):null;
    const pairB=comers[1]?kotc.pairs.find(p=>p.id===comers[1].pairId):null;
    nextCourts.push({courtNum:i,isBackDraw:isBack,pairA:pairA||null,pairB:pairB||null,score:{s1:'',s2:'',tb:'',confirmed:false},winner:null});
  }
  return {roundNum:lastRound.roundNum+1, courts:nextCourts, movements};
}

function kotcCommitRound(kotc){
  // Write all confirmed KOTC matches to S.history
  const lastRound=kotc.rounds[kotc.rounds.length-1];
  lastRound.courts.forEach(c=>{
    if(!c.score||!c.score.confirmed) return;
    const pA=c.pairA,pB=c.pairB;
    if(!pA||!pB) return;
    const t1=[pA.p1,pA.p2].filter(Boolean).map(p=>({id:p.id,name:p.name}));
    const t2=[pB.p1,pB.p2].filter(Boolean).map(p=>({id:p.id,name:p.name}));
    const key='kotc_'+kotc.id+'_r'+lastRound.roundNum+'_c'+c.courtNum;
    if(S.history.some(h=>h._k===key)) return;
    S.history.push({
      _k:key, date:kotc.date, eventName:kotc.name,
      court:String(c.courtNum), sessionLabel:'Round '+lastRound.roundNum,
      fmt:kotc.matchType==='singles'?'singles':'doubles',
      team1:t1, team2:t2,
      score1:parseInt(c.score.s1)||0, score2:parseInt(c.score.s2)||0,
      isKOTC:true, courtNum:c.courtNum, roundNum:lastRound.roundNum
    });
  });
  saveH();
}

      rm.onclick=()=>{k.pairs.splice(i,1);k._pendingPair=[];saveKotc();render();};

  const chipWrap=mk('div');chipWrap.style.cssText='display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px';
  const alreadyPairedIds=new Set(k.pairs.flatMap(p=>[p.p1?.id,p.p2?.id].filter(Boolean)));
  const pendingIds=new Set(k._pendingPair.map(p=>p.id));

  S.roster.forEach(p=>{
    const inPair=alreadyPairedIds.has(p.id);
    const pending=pendingIds.has(p.id);
    const chip=mk('div','chip'+(pending?' sel':'')+(inPair?' cp':''));
    chip.style.cssText=inPair?'opacity:.4;cursor:default':'cursor:pointer';
    const {str:bw}=courtWtnStr(p, k.matchType==='doubles');
    chip.innerHTML=`<div class="chip-name">${esc(p.name)}</div><div class="chip-meta">${bw||bestWtnStr(p)||'No rating'}</div>`;
    if(!inPair){
      chip.onclick=()=>{
        if(!isDoubles){
          // Singles — each player is their own "pair"
          if(alreadyPairedIds.has(p.id)) return;
          k.pairs.push({id:k._nextPairId++,p1:p,p2:null,isGuest:false});
          saveKotc();render();
        } else {
          if(pending){ k._pendingPair=k._pendingPair.filter(x=>x.id!==p.id); }
          else if(k._pendingPair.length<2){ k._pendingPair.push(p); }
          if(k._pendingPair.length===2){
            k.pairs.push({id:k._nextPairId++,p1:k._pendingPair[0],p2:k._pendingPair[1],isGuest:false});
            k._pendingPair=[];
          }
          saveKotc();render();
        }
      };
    }
    chipWrap.appendChild(chip);
  });
  rosterCard.appendChild(chipWrap);

  // Pending pair status

    st.textContent='Selected: '+k._pendingPair[0].name+' — tap a second player to lock the pair';

  pg.appendChild(rosterCard);

  // Walk-up guest add
  const guestCard=mk('div','card');
  guestCard.innerHTML=`<div class="ct" style="font-size:.78rem">+ Add Walk-up Player</div>`;
  const gRow=mk('div');gRow.style.cssText='display:flex;gap:7px;flex-wrap:wrap;align-items:flex-end;margin-bottom:8px';

  const makeGInp=(ph,w)=>{const i=document.createElement('input');i.type='text';i.placeholder=ph;i.style.cssText=`flex:${w||1};min-width:80px;padding:7px 9px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:.8rem;font-family:inherit`;return i;};
  const gName=makeGInp('Full Name',2);
  const gWtnS=makeGInp('WTN-S',1);
  const gWtnD=makeGInp('WTN-D',1);
  const gAdd=mk('button','btn btn-s btn-sm');gAdd.textContent='+ Add';gAdd.style.cssText='padding:7px 12px;flex-shrink:0';
  gAdd.onclick=()=>{
    const name=gName.value.trim();
    if(!name){alert('Enter a name.');return;}
    const gp={id:S.nextId++,name,wtn:gWtnS.value||gWtnD.value||'',wtnS:gWtnS.value.trim(),wtnD:gWtnD.value.trim(),isGuest:true,sandbox:false};
    saveR();
    if(!isDoubles){
      k.pairs.push({id:k._nextPairId++,p1:gp,p2:null,isGuest:true});
      saveKotc();render();
    } else {
      k._pendingPair.push(gp);
      if(k._pendingPair.length===2){
        k.pairs.push({id:k._nextPairId++,p1:k._pendingPair[0],p2:k._pendingPair[1],isGuest:k._pendingPair.some(x=>x.isGuest)});
        k._pendingPair=[];
      }
      saveKotc();render();
    }
    gName.value='';gWtnS.value='';gWtnD.value='';
  };
  gRow.appendChild(gName);gRow.appendChild(gWtnS);gRow.appendChild(gWtnD);gRow.appendChild(gAdd);
  guestCard.appendChild(gRow);
  pg.appendChild(guestCard);

  // Navigation
  const minPairs=k.courtCount*(isDoubles?2:1); // needs 2 pairs per court for doubles, but at minimum courtCount pairs
  const pairsNeeded=k.courtCount*2; // 2 pairs per court
  const ready=k.pairs.length>=2;
  const btnRow=mk('div');btnRow.style.cssText='display:flex;gap:8px;margin-top:4px';
  const backBtn=mk('button','btn btn-s');backBtn.textContent='← Back';backBtn.style.cssText='flex:1;padding:11px';
  backBtn.onclick=()=>{k.status='setup';saveKotc();render();};
  const nextBtn=mk('button','btn btn-p');nextBtn.innerHTML='Seed Courts →';nextBtn.style.cssText=`flex:2;padding:11px;opacity:${ready?1:.45}`;
  if(!ready) nextBtn.title='Add at least 2 pairs to continue';
  nextBtn.onclick=()=>{
    if(!ready) return;
    // Pair up any solo players left in pending
    if(k._pendingPair.length===1){
      k.pairs.push({id:k._nextPairId++,p1:k._pendingPair[0],p2:null,isGuest:k._pendingPair[0].isGuest});
      k._pendingPair=[];
    }
    k.status='seeding';saveKotc();render();
  };
  const countNote=mk('div');countNote.style.cssText='font-size:.7rem;color:var(--text-muted);text-align:center;margin-top:6px';
  countNote.textContent=k.pairs.length+' pair'+(k.pairs.length!==1?'s':'')+' · '+k.courtCount+' courts need '+(k.courtCount*2)+' pairs';
  btnRow.appendChild(backBtn);btnRow.appendChild(nextBtn);
  pg.appendChild(btnRow);
  pg.appendChild(countNote);
}

function renderKotcSeeding(pg){
  const k=S.kotc;
  const wc=kotcWinnerCourts(k.courtCount);
  const bc=kotcBackCourts(k.courtCount);

  // Seed pairs to courts
  if(!k._seededCourts){
    let orderedPairs=[...k.pairs];
    if(k.seedMethod==='ai'){
      // Sort by avg WTN ascending (stronger = lower number = Court 1)
      orderedPairs.sort((a,b)=>{
        const avgWtn=pair=>{ const vals=[pair.p1,pair.p2].filter(Boolean).map(p=>parseFloat(p.wtnD||p.wtnS||p.wtn||30)).filter(v=>!isNaN(v)); return vals.length?vals.reduce((s,v)=>s+v,0)/vals.length:30;};
        return avgWtn(a)-avgWtn(b);
      });
    } else if(k.seedMethod==='random'){
      orderedPairs=shuf(orderedPairs);
    }
    // Assign pairs to courts (2 pairs per court)
    k._seededCourts=[];
    for(let i=1;i<=k.courtCount;i++){
      const isBack=i>wc;
      const pairA=orderedPairs[(i-1)*2]||null;
      const pairB=orderedPairs[(i-1)*2+1]||null;
      k._seededCourts.push({courtNum:i,isBackDraw:isBack,pairA,pairB,score:{s1:'',s2:'',tb:'',confirmed:false},winner:null});
    }
    saveKotc();
  }

  const card=mk('div','card');
  card.innerHTML=`<div class="ct">👑 Court Seeding — Round 1</div><div style="font-size:.75rem;color:var(--text-muted);margin-bottom:12px">Review court assignments. Tap pairs to swap between courts.</div>`;

  k._seededCourts.forEach((c,ci)=>{
    const isBack=c.isBackDraw;
    const courtDiv=mk('div');
    courtDiv.style.cssText=`padding:10px 12px;border-radius:9px;border:1px solid ${isBack?'rgba(201,168,76,.3)':'var(--border)'};background:${isBack?'rgba(201,168,76,.05)':'var(--surface2)'};margin-bottom:8px`;
    const cHdr=mk('div');cHdr.style.cssText='display:flex;align-items:center;gap:7px;margin-bottom:8px';
    cHdr.innerHTML=`<span style="font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:var(--lime)">Court ${c.courtNum}</span>${c.courtNum===1?'<span style="font-size:.8rem">👑</span>':''}${isBack?'<span style="font-size:.65rem;padding:1px 6px;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);border-radius:10px;color:var(--gold)">Back Draw</span>':'<span style="font-size:.65rem;padding:1px 6px;background:rgba(52,199,89,.1);border:1px solid var(--green);border-radius:10px;color:var(--green)">Winner Draw</span>'}`;
    courtDiv.appendChild(cHdr);

    // Pair display with swap dropdowns
    [[c.pairA,'A'],[c.pairB,'B']].forEach(([pair,side])=>{
      const pRow=mk('div');pRow.style.cssText='display:flex;align-items:center;gap:6px;margin-bottom:5px';
      const lbl=mk('span');lbl.style.cssText='font-size:.65rem;color:var(--text-muted);min-width:14px';lbl.textContent=side;
      const sel=document.createElement('select');
      sel.style.cssText='flex:1;padding:5px 7px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.78rem;font-family:inherit';
      sel.innerHTML=k.pairs.map(p=>`<option value="${p.id}" ${pair&&pair.id===p.id?'selected':''}>${esc(p.p1.name+(p.p2?' + '+p.p2.name:''))}</option>`).join('');
      sel.onchange=()=>{
        const chosen=k.pairs.find(p=>p.id===parseInt(sel.value));
        if(side==='A') k._seededCourts[ci].pairA=chosen;
        else k._seededCourts[ci].pairB=chosen;
        saveKotc();
      };
      pRow.appendChild(lbl);pRow.appendChild(sel);
      courtDiv.appendChild(pRow);
    });
    card.appendChild(courtDiv);
  });

  const btnRow=mk('div');btnRow.style.cssText='display:flex;gap:8px;margin-top:8px';
  const backBtn=mk('button','btn btn-s');backBtn.textContent='← Back';backBtn.style.cssText='flex:1;padding:11px';
  backBtn.onclick=()=>{k._seededCourts=null;k.status='intake';saveKotc();render();};
  const startBtn=mk('button','btn btn-p');startBtn.innerHTML='👑 Start Round 1';startBtn.style.cssText='flex:2;padding:11px;font-size:.92rem';
  startBtn.onclick=()=>{
    k.rounds=[{roundNum:1,courts:k._seededCourts,movements:[]}];
    k._seededCourts=null;
    k.status='active';
    saveKotc();render();
  };
  btnRow.appendChild(backBtn);btnRow.appendChild(startBtn);
  card.appendChild(btnRow);
  pg.appendChild(card);
}

function renderKotcRound(pg){

    const isBack=c.isBackDraw;
    const cc=mk('div','ccard');
    const pA=c.pairA,pB=c.pairB;
    const pAname=pA?(pA.p1.name+(pA.p2?' & '+pA.p2.name:'')):'TBD';
    const pBname=pB?(pB.p1.name+(pB.p2?' & '+pB.p2.name:'')):'TBD';

      <div class="tgrid">

        <div class="vs-txt">VS</div>

      </div>`;

      const sc=mk('div');sc.style.cssText='padding:8px 12px;border-top:1px solid var(--border)';
      const sRow=mk('div');sRow.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:8px';
      const s1=document.createElement('input');s1.type='number';s1.placeholder='0';s1.value=c.score.s1||'';
      s1.style.cssText='width:50px;padding:6px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:1rem;text-align:center;font-family:inherit';
      s1.oninput=()=>{c.score.s1=s1.value;saveKotc();};
      const dash=mk('span');dash.textContent='–';dash.style.cssText='color:var(--text-muted);font-size:1rem';
      const s2=document.createElement('input');s2.type='number';s2.placeholder='0';s2.value=c.score.s2||'';
      s2.style.cssText=s1.style.cssText;
      s2.oninput=()=>{c.score.s2=s2.value;saveKotc();};
      sRow.appendChild(s1);sRow.appendChild(dash);sRow.appendChild(s2);

      const confBtn=mk('button','btn btn-p btn-sm');confBtn.textContent='✓ Confirm';confBtn.style.cssText='width:100%;padding:8px';
      confBtn.onclick=()=>{
        const v1=parseInt(s1.value),v2=parseInt(s2.value);
