        c.winner=v1>v2?'A':'B';
        saveKotc();render();
      };
      sc.appendChild(sRow);sc.appendChild(confBtn);
      cc.appendChild(sc);
    } else {
      confirmedCount++;
      const conf=mk('div');conf.style.cssText='padding:7px 12px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between';
      conf.innerHTML=`<span style="font-family:monospace;font-size:1.1rem;font-weight:700;color:var(--green)">${c.score.s1} – ${c.score.s2}</span><span class="conf-badge">✓ ${c.winner==='A'?esc(pAname):esc(pBname)} wins</span>`;
      cc.appendChild(conf);

  // Progress

  prog.textContent=confirmedCount+'/'+round.courts.length+' courts confirmed';
  pg.appendChild(prog);

  const allDone=confirmedCount===round.courts.length;
  const mvBtn=mk('button','btn btn-p');

  pg.appendChild(mvBtn);
}

function renderKotcMovement(pg){
  const k=S.kotc;
  const round=k.rounds[k.rounds.length-1];
  const movements=round.movements||[];
  const isLastRound=round.roundNum>=3;

  const card=mk('div','card');
  card.innerHTML=`<div class="ct">Round ${round.roundNum} → Round ${round.roundNum+1} Movement</div><div style="font-size:.75rem;color:var(--text-muted);margin-bottom:12px">Review court movements. Tap a court to override before confirming.</div>`;

  // Show movement per court
  const wc=kotcWinnerCourts(k.courtCount);
  for(let courtNum=1;courtNum<=k.courtCount;courtNum++){
    const isBack=courtNum>wc;
    const courtMovs=movements.filter(m=>m.fromCourt===courtNum);
    const courtDiv=mk('div');
    courtDiv.style.cssText=`padding:9px 12px;border-radius:9px;border:1px solid ${isBack?'rgba(201,168,76,.3)':'var(--border)'};background:var(--surface2);margin-bottom:7px`;
    let html=`<div style="font-family:'Bebas Neue',sans-serif;font-size:.85rem;color:var(--lime);margin-bottom:5px">Court ${courtNum} ${courtNum===1?'👑':''}</div>`;
    courtMovs.forEach(m=>{
      const pair=k.pairs.find(p=>p.id===m.pairId);
      if(!pair) return;
      const name=pair.p1.name+(pair.p2?' & '+pair.p2.name:'');
      let arrow='',color='var(--text)';
      if(m.crown){arrow='👑 ';color='var(--gold)';}
      else if(m.promoted){arrow='⬆ ';color='var(--green)';}
      else if(m.stays){arrow='➡ ';color='var(--text-muted)';}
      else if(m.toCourt<m.fromCourt){arrow='↑ Court '+m.toCourt+' ';color='var(--green)';}
      else if(m.toCourt>m.fromCourt){arrow='↓ Court '+m.toCourt+' ';color='var(--red)';}
      html+=`<div style="font-size:.8rem;color:${color};padding:2px 0">${arrow}${esc(name)}</div>`;
    });
    courtDiv.innerHTML=html;
    card.appendChild(courtDiv);
  }
  pg.appendChild(card);

  const btnRow=mk('div');btnRow.style.cssText='display:flex;gap:8px';
  if(isLastRound){
    const finBtn=mk('button','btn btn-p');finBtn.innerHTML='🏆 View Results';finBtn.style.cssText='flex:1;padding:12px;font-size:.9rem';
    finBtn.onclick=()=>{k.status='summary';saveKotc();render();};
    btnRow.appendChild(finBtn);
  } else {
    const nextBtn=mk('button','btn btn-p');nextBtn.innerHTML='Start Round '+(round.roundNum+1)+' →';nextBtn.style.cssText='flex:1;padding:12px;font-size:.9rem';
    nextBtn.onclick=()=>{
      const nextRound=kotcBuildNextRound(k);
      k.rounds.push(nextRound);
      k.status='active';
      saveKotc();render();
    };
    btnRow.appendChild(nextBtn);
  }
  pg.appendChild(btnRow);
}

function renderKotcSummary(pg){
  const k=S.kotc;
  const wc=kotcWinnerCourts(k.courtCount);
  const bc=kotcBackCourts(k.courtCount);
  const lastRound=k.rounds[k.rounds.length-1];

  // Find KOTC winner — pair on Court 1 that won last round
  const court1=lastRound.courts.find(c=>c.courtNum===1);
  const kotcWinner=court1&&court1.winner?( court1.winner==='A'?court1.pairA:court1.pairB):null;

  // Find Back Draw winner if applicable
  let backWinner=null;
  if(bc>0){
    const backCourt=lastRound.courts.find(c=>c.courtNum===wc+1);
    backWinner=backCourt&&backCourt.winner?(backCourt.winner==='A'?backCourt.pairA:backCourt.pairB):null;
  }

  const card=mk('div','card');
  card.innerHTML=`<div class="ct">👑 KOTC Results</div>`;

  // KOTC Champion
  if(kotcWinner){
    const champ=mk('div');
    champ.style.cssText='text-align:center;padding:16px;background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(52,199,89,.1));border-radius:12px;border:1px solid var(--gold);margin-bottom:12px';

    card.appendChild(bchamp);

  // Round by round results

    const rHdr=mk('div');rHdr.style.cssText='font-size:.65rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin:10px 0 5px';rHdr.textContent='Round '+r.roundNum;card.appendChild(rHdr);

      const w=c.winner==='A'?pA:pB,l=c.winner==='A'?pB:pA;
      row.innerHTML=`<span style="color:var(--lime)">Ct ${c.courtNum}</span> <span style="font-weight:600;color:var(--green)">${esc(w?w.p1.name+(w.p2?' & '+w.p2.name:''):'?')}</span> <span style="color:var(--text-muted)">def.</span> <span>${esc(l?l.p1.name+(l.p2?' & '+l.p2.name:''):'?')}</span> <span style="font-family:monospace;font-weight:700">${c.score.s1}–${c.score.s2}</span>`;
      card.appendChild(row);
    });
  });

  // Guest roster prompt
  const guests=k.pairs.filter(p=>p.isGuest);
  if(guests.length){
    const gCard=mk('div');gCard.style.cssText='margin-top:14px;padding:12px;background:var(--surface2);border-radius:10px;border:1px solid var(--border)';

    gPlayers.forEach(p=>{

// ── PARTNER TRIAL ROTATION SOLVER ────────────────────────────────────────────
// Given focal players, trial players, and session count, generates a rotation
// ── Trial Rotation Solver v4 ─────────────────────────────────────────────────
// Rules:
//   1. Each trial player partners with each focal player exactly once per cycle
//   2. Opponents on trial courts rotate every session — no repeat opponent pairs
//   3. Locked pairs stay together but circulate freely (not pinned to any court)
//   4. Remaining players go to open courts via genPairings (WTN-balanced, varied)
function buildTrialSessions(focalIds, trialIds, lockedPairs, sessionCount, allPlayers, courtIds, chosenLayout){
  const focals   = focalIds.map(id=>allPlayers.find(p=>p.id===parseInt(id))).filter(Boolean);
  const trials   = trialIds.map(id=>allPlayers.find(p=>p.id===parseInt(id))).filter(Boolean);
  const focalSet = new Set(focals.map(p=>p.id));
  const trialSet = new Set(trials.map(p=>p.id));
  const totalCourts = chosenLayout.dC + chosenLayout.sC;

  // Resolve locked pairs
  const resolvedLocked = (lockedPairs||[])
    .map(pr=>pr.map(id=>allPlayers.find(p=>p.id===parseInt(id))).filter(Boolean))
    .filter(pr=>pr.length===2);
  const lockedIds = new Set(resolvedLocked.flatMap(pr=>pr.map(p=>p.id)));

  // Open players = not focal, not trial
  const openPlayers = allPlayers.filter(p=>!focalSet.has(p.id)&&!trialSet.has(p.id));
  const freeOpen    = openPlayers.filter(p=>!lockedIds.has(p.id));

  // Pre-build a stable set of open opponent pairs for scheduling
  // Locked pairs count as one unit; free players paired by WTN balance
  const sortedFree = [...freeOpen].sort((a,b)=>(parseFloat(a.wtn)||30)-(parseFloat(b.wtn)||30));
  const freePairPool = [];
  const tmpFree = [...sortedFree];
  while(tmpFree.length>=2) freePairPool.push([tmpFree.shift(), tmpFree.pop()]);

  // Full opponent pool: locked pairs + free pairs
  const allOppPairs = [...resolvedLocked, ...freePairPool];
  const numOppPairs = allOppPairs.length;

  // Track which pair has faced which trial court across sessions
  // oppUsedAsTrial[pairKey] = number of times used as trial court opponent
  const oppUsedCount = {};
  allOppPairs.forEach(pr=>{ oppUsedCount[pr.map(p=>p.id).sort().join(',')] = 0; });

  const sessions = [];
  const partHist = [];

  for(let si=0; si<sessionCount; si++){
    const usedIds = new Set();
    const courts  = [];

    // ── Step 1: Focal → Trial pairings ───────────────────────────────────────
    const usedFocals = new Set();
    trials.forEach((trial, ti)=>{
      let focal = null;
      for(let attempt=0; attempt<focals.length; attempt++){
        const candidate = focals[(si + ti + attempt) % focals.length];
        if(!usedFocals.has(candidate.id)){ focal=candidate; break; }
      }
      if(!focal) return;
      usedFocals.add(focal.id);
      usedIds.add(trial.id);
      usedIds.add(focal.id);
      const cid = courtIds[courts.length] || String(courts.length+1);
      courts.push({
        courtId:cid, fmt:'doubles',
        team1:[focal,trial], team2:[],
        toss:Math.floor(Math.random()*2),
        isTrial:true, trialPlayerId:trial.id, focalPlayerId:focal.id
      });
    });

    // ── Step 2: Assign opponents to trial courts ──────────────────────────────
    // Pick pairs that have been used least as trial opponents, and are not already placed
    courts.forEach(c=>{
      if(!c.isTrial) return;
      // Sort available pairs by use count ascending (least used first), then WTN balance
      const available = allOppPairs.filter(pr=>
        pr.every(p=>!usedIds.has(p.id))
      ).sort((a,b)=>{
        const keyA=a.map(p=>p.id).sort().join(',');
        const keyB=b.map(p=>p.id).sort().join(',');
        return (oppUsedCount[keyA]||0)-(oppUsedCount[keyB]||0);
      });
      if(available.length===0) return;
      const chosen = available[0];
      c.team2 = chosen;
      const key = chosen.map(p=>p.id).sort().join(',');
      oppUsedCount[key] = (oppUsedCount[key]||0) + 1;
      chosen.forEach(p=>usedIds.add(p.id));
    });

    // ── Step 3: Remaining open courts ────────────────────────────────────────
    const remCourtCount = totalCourts - courts.length;
    const remCourtIds   = courtIds.slice(courts.length);
    const remDC = Math.max(0, chosenLayout.dC - courts.filter(c=>c.fmt==='doubles').length);
    const remSC = Math.max(0, remCourtCount - remDC);
    const stillFree = allPlayers.filter(p=>!usedIds.has(p.id));

    if(remCourtCount>0 && stillFree.length>=2){
      const remLocked = resolvedLocked
        .filter(pr=>pr.every(p=>!usedIds.has(p.id)))
        .map(pr=>pr.map(p=>p.id));
      const aiCourts = genPairings({
        players: stillFree,
        locked:  remLocked,
        bal:     'spread',
        hist:    partHist,
        matchupHist: new Set(),
        courtIds: remCourtIds,
        dC: remDC,
        sC: remSC
      });
      aiCourts.forEach(c=>courts.push(c));
    } else if(remCourtCount>0 && stillFree.length===1){
      // Absorb lone player into last trial court team2 if there's a slot
      const lastTrial = [...courts].reverse().find(c=>c.isTrial&&(c.team2||[]).filter(Boolean).length<2);
      if(lastTrial) lastTrial.team2.push(stillFree[0]);
    }

    // Track partner history
    const ph={};
    courts.forEach(c=>{
      const t1=(c.team1||[]).filter(Boolean),t2=(c.team2||[]).filter(Boolean);
      if(t1.length>=2){ph[t1[0].id]=t1[1].id;ph[t1[1].id]=t1[0].id;}
      if(t2.length>=2){ph[t2[0].id]=t2[1].id;ph[t2[1].id]=t2[0].id;}
    });
    partHist.push(ph);
    sessions.push(courts);
  }
  return sessions;
}

  pg.appendChild(genBtn);

  const getPlayers=()=>S.roster.filter(p=>_sel.has(p.id));

  // ── Schedule preview ──────────────────────────────────────────────────────
  function updPreview(){
    const d=dtInp.value||defD,s=stInp.value||defT;

    prevW.innerHTML=`<div class="divider"><div class="dl"></div><div class="dlt">Schedule — ${fD(d)}</div><div class="dl"></div></div>
    <div class="tline">${rows.map(r=>`<div class="tlrow"><span class="tlt">${r.t}</span><span>${r.l}</span>${r.b?`<span class="tlb">${r.b}</span>`:''}</div>`).join('')}</div>`;

    {key:'strong-vs-weak', label:'Strong v Weak',   desc:'Stronger teams face weaker teams — great for handicap play or identifying the true rankings.'},
    {key:'random',         label:'Random',          desc:'AI randomly builds all pairings and matchups. No WTN weighting applied.'},
    {key:'trial',          label:'Partner Trials',  desc:'Evaluate new players by rotating them through established partners. Flag Focal (known) and Trial (new) players — the system builds the rotation automatically.'},
    {key:'manual',         label:'Manual',          desc:'You set up every pairing yourself before the session starts.'},
  ];
  let _curBal=ev.balanceMode||'spread';

  // ── Trial state ───────────────────────────────────────────────────────────
  let _focalIds=new Set((ev.focalIds||[]).map(id=>parseInt(id)));

    trialCard.innerHTML='';

      const em=mk('div');em.style.cssText='font-size:.78rem;color:var(--text-muted);padding:4px 0';

      trialCard.appendChild(em);return;

    inst.innerHTML='<strong style="color:var(--green)">Focal 🎯</strong> = established players evaluating newcomers. <strong style="color:var(--gold)">Trial 🧪</strong> = newcomers being tested. Tap each player to cycle their role. Use the pair lock below to keep known partnerships together.';
    trialCard.appendChild(inst);

    // ── Player chips: unassigned → Focal → Trial → unassigned ────────────────

    trialCard.appendChild(chipLbl);

      chipWrap.appendChild(chip);
    });

      statLine.textContent=`✓ ${fCount} Focal · ${tCount} Trial · ${players.length-fCount-tCount} open`;
    }
    trialCard.appendChild(statLine);
    if(!ready) return;

    // ── Locked pairs for open players ────────────────────────────────────────

    if(openPlayers.length>=2){
      const lpDiv=mk('div');lpDiv.style.cssText='padding:10px 12px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);margin-bottom:10px';
      const lpHdr=mk('div');lpHdr.style.cssText='font-size:.62rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:8px';
      lpHdr.textContent='🔒 Lock Open-Player Pairs';
      lpDiv.appendChild(lpHdr);

      const lpRow=mk('div');lpRow.style.cssText='display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:8px';
      const makeSel=sfx=>{
        const sel=document.createElement('select');
        sel.style.cssText='flex:1;min-width:90px;padding:6px 8px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.75rem;font-family:inherit';
        sel.innerHTML='<option value="">Select...</option>'+openPlayers.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
        return sel;
      };
      const s1=makeSel('a'),s2=makeSel('b');
      const addBtn=mk('button','btn btn-s btn-sm');addBtn.textContent='+ Lock';
      addBtn.style.cssText='padding:5px 11px;font-size:.75rem;flex-shrink:0';
      addBtn.onclick=()=>{

      if(_pairs.length){
        const pairList=mk('div');pairList.style.cssText='display:flex;flex-wrap:wrap;gap:5px';
        _pairs.forEach((pr,i)=>{
          const p1=players.find(p=>p.id===pr[0]),p2=players.find(p=>p.id===pr[1]);
          if(!p1||!p2) return;
          const tag=mk('div');
          tag.style.cssText='display:inline-flex;align-items:center;gap:5px;padding:3px 9px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:.72rem;color:var(--text)';
          tag.innerHTML=`🔒 ${esc(p1.name)} + ${esc(p2.name)} `;
          const rm=mk('button');rm.textContent='×';rm.style.cssText='border:none;background:none;cursor:pointer;color:var(--text-muted);font-size:.9rem;padding:0;line-height:1';
          rm.onclick=()=>{_pairs.splice(i,1);buildTrialPanel();};
          tag.appendChild(rm);pairList.appendChild(tag);
        });
        lpDiv.appendChild(pairList);
      }
      trialCard.appendChild(lpDiv);
    }

    // ── Player count sanity check ─────────────────────────────────────────────
    // Total players must be divisible evenly across courts (4 per doubles court)
    const totalCourts=_chosenLayout?(_chosenLayout.dC+_chosenLayout.sC):0;
    const totalSlotsNeeded=totalCourts*4;
    if(players.length!==totalSlotsNeeded){
      const diff=players.length-totalSlotsNeeded;
      const wn=mk('div');wn.style.cssText='font-size:.72rem;color:var(--gold);padding:7px 10px;background:rgba(201,168,76,.08);border-radius:8px;border:1px solid rgba(201,168,76,.3);margin-bottom:8px';
      wn.textContent='⚠ '+players.length+' players selected for '+totalCourts+' doubles court'+(totalCourts>1?'s':'')+' (needs '+totalSlotsNeeded+'). '+(diff>0?diff+' player'+(diff>1?'s':'')+' will be left out.':Math.abs(diff)+' more player'+(Math.abs(diff)>1?'s':'')+' needed.');
      trialCard.appendChild(wn);
    }

    // ── Ready state ───────────────────────────────────────────────────────────
    const readyNote=mk('div');
    readyNote.style.cssText='font-size:.75rem;color:var(--green);padding:8px 10px;background:rgba(52,199,89,.08);border-radius:8px;border:1px solid rgba(52,199,89,.2)';
    readyNote.innerHTML=`✓ Ready — hit <strong>Generate Trial Session</strong> below. Focal/Trial rotation is automatic${_pairs.length?' · locked pairs stay together':''}.`;
    trialCard.appendChild(readyNote);
  }

  function buildBalBtns(){
    balBtnsEl.innerHTML='';
    BAL_OPTS.forEach(opt=>{
      const active=opt.key===_curBal;
      const isTrial=opt.key==='trial';
      const btn=mk('button');
      btn.textContent=opt.label;
      const activeColor=isTrial?'var(--gold)':'var(--green)';
      const activeBg=isTrial?'rgba(201,168,76,.85)':'var(--green)';
      btn.style.cssText=`font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:${active?700:500};padding:7px 13px;border-radius:8px;cursor:pointer;border:1.5px solid ${active?activeColor:'var(--border)'};background:${active?activeBg:'var(--surface)'};color:${active?'#fff':'var(--text-mid)'};transition:all .15s`;
      btn.onclick=()=>{
        _curBal=opt.key;
        buildBalBtns();
        trialCard.style.display=_curBal==='trial'?'block':'none';
        if(_curBal==='trial')buildTrialPanel();
        genBtn.textContent=_curBal==='manual'?'Manual Setup →':_curBal==='trial'?'Generate Trial Session':'Generate Session';
      };
      balBtnsEl.appendChild(btn);
    });
    const cur=BAL_OPTS.find(o=>o.key===_curBal);
    balDescEl.textContent=cur?cur.desc:'';
    trialCard.style.display=_curBal==='trial'?'block':'none';
    if(_curBal==='trial')buildTrialPanel();
  }
  buildBalBtns(); // initial render — populate Step 3 buttons on load

  // ── Court number inputs — created once as real DOM nodes, never innerHTML-wiped ──
  // This is the fix for the "can't type" bug: inputs are DOM nodes appended directly,
  // not injected via innerHTML, so typing never triggers a re-render that nukes them.
  let _courtInputs=[];  // keep refs to read values at generate time

  function updCourtNumbers(){
    const nc=parseInt(ncInp.value)||2;
    const total=_chosenLayout?(_chosenLayout.dC+_chosenLayout.sC):nc;
    const count=Math.max(nc,total);
    const saved=ev.courtIds||[];

    // If count shrank, remove extras. If grew, add new ones.
    while(_courtInputs.length>count){
      const removed=_courtInputs.pop();
      if(removed.parentNode)removed.parentNode.remove(); // remove the fg wrapper
    }
    for(let i=_courtInputs.length;i<count;i++){
      const isD=_chosenLayout?i<_chosenLayout.dC:true;
      const fg=mk('div','fg');
      // Court label: number + D/S pill
      const lbl=document.createElement('label');
      lbl.style.cssText='display:flex;align-items:center;gap:5px;margin-bottom:3px';
      const courtNum=mk('span');courtNum.style.cssText='font-size:.75rem;color:var(--text-mid);font-weight:600';
      courtNum.textContent='Court '+(i+1);
      const badge=mk('span','fbadge '+(isD?'fd':'fs'));
      badge.style.cssText='font-size:.58rem;padding:1px 5px';
      badge.textContent=isD?'Doubles':'Singles';
      lbl.appendChild(courtNum);lbl.appendChild(badge);
      const inp=document.createElement('input');
      inp.type='text';inp.className='cii';inp.dataset.idx=String(i);
      inp.value=saved[i]||String(i+1);inp.placeholder=String(i+1);
      inp.style.cssText='width:60px;font-size:.88rem';
      fg.appendChild(lbl);fg.appendChild(inp);
      courtNumsEl.appendChild(fg);
      _courtInputs.push(inp);
    }

    // Update badges if layout changed (existing inputs)
    _courtInputs.forEach((inp,i)=>{
      const fg=inp.parentNode;
      if(!fg)return;
      const isD=_chosenLayout?i<_chosenLayout.dC:true;
      const badge=fg.querySelector('.fbadge');
      if(badge){badge.className='fbadge '+(isD?'fd':'fs');badge.textContent=isD?'Doubles':'Singles';}
    });
  }

  // ── Layout card (Step 5) ──────────────────────────────────────────────────
  function updLayoutCard(){
    const players=getPlayers(),n=players.length;
    const nc=parseInt(ncInp.value)||2;
    const opts=calcLayouts(n,nc);
    updChips();

    if(n<2){
      layoutCard.innerHTML='';
      layoutCard.appendChild(secHdr(6,'Court Layout'));
      const em=mk('div','empty');em.style.padding='10px 0';em.textContent='Select players first (Step 2) to see layout options.';
      layoutCard.appendChild(em);
      return;
    }

      layoutCard.innerHTML='';
      layoutCard.appendChild(secHdr(6,'Court Layout'));
      const em=mk('div','empty');em.style.padding='10px 0';
      em.innerHTML=`No valid layout for ${n} players on ${nc} court${nc>1?'s':''}.<br><span style="font-size:.72rem">Try a different player count or court count.</span>`;
      layoutCard.appendChild(em);
      _chosenLayout=null;return;
    }
    if(!_chosenLayout||!opts.find(o=>o.dC===_chosenLayout.dC&&o.sC===_chosenLayout.sC)){_chosenLayout=opts[0];}

    layoutCard.appendChild(secHdr(6,'Court Layout'));
    const subLbl=mk('div');subLbl.style.cssText='font-size:.75rem;color:var(--text-muted);margin-bottom:10px';
    subLbl.textContent=`${n} players · ${nc} court${nc>1?'s':''} — choose how to split them:`;
    layoutCard.appendChild(subLbl);

    const lopts=mk('div','layout-opts');lopts.id='lopts';layoutCard.appendChild(lopts);

    if(_chosenLayout&&_chosenLayout.sC>0){
      const sw=players.filter(p=>p.singlesOk);
      const ibox=mk('div','ibox');
      ibox.innerHTML=`<strong style="color:var(--orange)">&#127934; Singles-willing:</strong> ${sw.length?sw.map(p=>esc(p.name)).join(', '):'None marked — set in Squad tab.'}`;
      layoutCard.appendChild(ibox);
    }

    opts.forEach(opt=>{
      const sel=opt.dC===_chosenLayout.dC&&opt.sC===_chosenLayout.sC;
      const div=mk('div','lopt'+(sel?' sel':''));
      const badges=[];
      if(opt.dC>0)badges.push(`<span class="fbadge fd">${opt.dC}× Doubles</span>`);
      if(opt.sC>0)badges.push(`<span class="fbadge fs">${opt.sC}× Singles</span>`);
      div.innerHTML=`<div><div class="lopt-label">${opt.label}</div><div class="lopt-sub">${opt.sub}</div></div><div style="display:flex;gap:4px;flex-shrink:0">${badges.join('')}</div>`;
      div.onclick=()=>{_chosenLayout=opt;updLayoutCard();updCourtNumbers();};
      lopts.appendChild(div);

    updCourtNumbers();
  }

  // ── Player chips ──────────────────────────────────────────────────────────
  let _playerFilter='squad';

  function updChips(){
    // Filter bar
    filterBar.innerHTML='';
    const makeFilterBtn=(label,key)=>{
      const active=_playerFilter===key;
      const b=mk('button');
      b.textContent=label;
      b.style.cssText=`font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:${active?700:500};padding:4px 11px;border-radius:7px;cursor:pointer;border:1.5px solid ${active?'var(--green)':'var(--border)'};background:${active?'var(--green)':'var(--surface)'};color:${active?'#fff':'var(--text-muted)'};transition:all .15s`;
      b.onclick=()=>{_playerFilter=key;updChips();};
      return b;
    };
    filterBar.appendChild(makeFilterBtn('All Squad','squad'));
    (S.teams||[]).filter(t=>t.playerIds&&t.playerIds.length).forEach(t=>filterBar.appendChild(makeFilterBtn(t.name,t.id)));

    // Visible roster
    let vis=S.roster;
    if(_playerFilter!=='squad'){
      const tm=(S.teams||[]).find(t=>t.id===_playerFilter);
      if(tm&&tm.playerIds)vis=S.roster.filter(p=>tm.playerIds.includes(p.id));
    }
    chipGrid.innerHTML='';
    if(!S.roster.length){chipGrid.innerHTML='<div class="empty" style="grid-column:1/-1">Add players in the Squad tab first.</div>';selSt.innerHTML='';return;}
    if(!vis.length){chipGrid.innerHTML='<div class="empty" style="grid-column:1/-1">No players in this team yet.</div>';selSt.innerHTML='';return;}
    vis.forEach(p=>{
      const sel=_sel.has(p.id);
      const chip=mk('div','chip'+(sel?' sel':'')+(p.courtLocked?' cp':''));
      const _bw=bestWtnStr(p),_tt=wtnTooltip(p);
      chip.innerHTML=`<div class="chip-pin">${p.courtLocked?'&#128204;':''}</div><div class="chip-name">${esc(p.name)}</div><div class="chip-meta">${_bw?`<span title="${esc(_tt)}">${esc(_bw)}</span>`:'No rating'}</div>`;
      chip.onclick=()=>{sel?_sel.delete(p.id):_sel.add(p.id);updLayoutCard();updPairSel();};
      chipGrid.appendChild(chip);
    });
    const n=_sel.size,nc=parseInt(ncInp.value)||2;
    const opts=calcLayouts(n,nc);
    const valid=opts.length>0&&_chosenLayout!=null;
    selSt.innerHTML=`<div style="font-size:.8rem;margin-top:8px;color:${valid?'var(--green)':'var(--text-muted)'}">${n} selected${valid?' — layout ready ✓':n>0?' — no valid layout for these numbers':''}</div>`;
  }

  // ── Pair lock ─────────────────────────────────────────────────────────────
  function updPairSel(){
    const opts='<option value="">Select...</option>'+S.roster.filter(p=>_sel.has(p.id)).map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
    [$('ps1'),$('ps2')].forEach(s=>{if(!s)return;const v=s.value;s.innerHTML=opts;if(v)s.value=v;});
    rPairList();
  }
  function rPairList(){
    if(!_pairs.length){plw.innerHTML='';return;}
    plw.innerHTML='<div style="display:flex;flex-wrap:wrap;margin-top:6px">'+_pairs.map((pr,i)=>{
      const p1=S.roster.find(x=>x.id===pr[0]),p2=S.roster.find(x=>x.id===pr[1]);
      return `<div class="ptag">&#128274; ${esc(p1&&p1.name||'?')} + ${esc(p2&&p2.name||'?')} <button data-pi="${i}">&#215;</button></div>`;
    }).join('')+'</div>';
    plw.querySelectorAll('[data-pi]').forEach(b=>b.onclick=()=>{_pairs.splice(parseInt(b.dataset.pi),1);rPairList();});
  }
  $('lp-btn').onclick=()=>{
    const i1=parseInt($('ps1')&&$('ps1').value),i2=parseInt($('ps2')&&$('ps2').value);
    if(!i1||!i2||i1===i2){alert('Select two different players.');return;}
    if(_pairs.some(p=>(p[0]===i1&&p[1]===i2)||(p[0]===i2&&p[1]===i1))){alert('Already locked.');return;}
    _pairs.push([i1,i2]);$('ps1').value='';$('ps2').value='';rPairList();
  };

  // ── Listeners — each scoped to its own card, no cross-card re-render ──────
  card7.addEventListener('input',()=>updPreview());
  [dtInp,stInp].forEach(el=>el.addEventListener('input',()=>updPreview()));
  ncInp.addEventListener('input',()=>{updCourtNumbers();updLayoutCard();});
  $('ev-mf').addEventListener('change',()=>{
    const mfv=$('ev-mf').value||'no-ad';
    fmtNote.textContent='SwingVision format: '+(MATCH_FORMATS[mfv]&&MATCH_FORMATS[mfv].label||'');
  });

  // ── Generate ──────────────────────────────────────────────────────────────
  genBtn.onclick=()=>{
    const players=getPlayers();
    if(players.length<2){alert('Select at least 2 players (Step 2).');return;}
    if(!_chosenLayout){alert('Choose a court layout (Step 5) first.');return;}
    const courtIds=_courtInputs.map((inp,i)=>inp.value.trim()||String(i+1));
    const sc=parseInt($('ev-sc')&&$('ev-sc').value)||3;
    const wu=parseInt($('ev-wu')&&$('ev-wu').value)||10;
    const sl=parseInt($('ev-sl')&&$('ev-sl').value)||35;
    const tr=parseInt($('ev-tr')&&$('ev-tr').value)||3;
    const bal=_curBal||'spread';
    const matchFormat=$('ev-mf')&&$('ev-mf').value||'no-ad';
    const startStr=stInp.value||defT;
    const dateStr=dtInp.value||defD;
    const evNm=nmInp.value.trim()||'';
    const nc=parseInt(ncInp.value)||2;
    const[h,m]=startStr.split(':').map(Number),base=new Date();base.setHours(h,m,0,0);
    let cursor=aM(base,wu);
    const sessions=[],partHist=[],matchupHist=new Set();
    const totalCourts=_chosenLayout.dC+_chosenLayout.sC;

    // ── Trial mode ────────────────────────────────────────────────────────────
    if(bal==='trial'){
      if(_focalIds.size===0||_trialIds.size===0){alert('Assign at least 1 Focal and 1 Trial player in the Partner Trials panel.');return;}
      const trialSessions=buildTrialSessions(
        [..._focalIds],[..._trialIds],_pairs,sc,players,courtIds,_chosenLayout
      );
      for(let s=0;s<sc;s++){
        if(s>0)cursor=aM(cursor,tr);
        const sS=new Date(cursor),sE=aM(sS,sl);cursor=sE;
        const courts=trialSessions[s]||[];
        sessions.push({courts,startTime:sS.toISOString(),endTime:sE.toISOString(),matchFormat,scores:courts.map(()=>({s1:'',s2:'',tb:'',confirmed:false}))});
      }
      S.event={
        name:evNm,date:dateStr,startTime:startStr,courtCount:nc,sessionCount:sc,
        warmupMin:wu,sessionMin:sl,transMin:tr,balanceMode:bal,matchFormat,courtIds,
        chosenLayout:_chosenLayout,playerIds:[..._sel],lockedPairs:_pairs,sessions,
        focalIds:[..._focalIds],trialIds:[..._trialIds]
      };
      saveE();S.sub='play';S.sess=0;S.pv=false;render();return;
    }

    // ── All other modes ───────────────────────────────────────────────────────
    for(let s=0;s<sc;s++){
      if(s>0)cursor=aM(cursor,tr);
      const sS=new Date(cursor),sE=aM(sS,sl);cursor=sE;
      let courts;
      if(bal==='manual'){
        courts=[];
        for(let ci=0;ci<totalCourts;ci++){
          const isD=ci<_chosenLayout.dC;
          const cid=courtIds[ci]||String(ci+1);
          let t1=[],t2=[];
          if(_pairs[ci]){const pr=_pairs[ci];const p1=players.find(p=>p.id===pr[0]),p2=players.find(p=>p.id===pr[1]);if(p1&&p2)t1=[p1,p2];}
          courts.push({courtId:cid,fmt:isD?'doubles':'singles',team1:t1,team2:t2,toss:0,manual:true});
        }
      } else {
        courts=genPairings({players,locked:_pairs,bal,hist:partHist,matchupHist,courtIds,dC:_chosenLayout.dC,sC:_chosenLayout.sC});
      }
      const ph={},ms=new Set();
      courts.forEach(c=>{
        const t1=(c.team1||[]).filter(Boolean),t2=(c.team2||[]).filter(Boolean);
        if(t1.length>=2){ph[t1[0].id]=t1[1].id;ph[t1[1].id]=t1[0].id;}
        if(t2.length>=2){ph[t2[0].id]=t2[1].id;ph[t2[1].id]=t2[0].id;}
        ms.add(matchupKey(t1,t2));
      });
      partHist.push(ph);matchupHist.add(ms);
      sessions.push({courts,startTime:sS.toISOString(),endTime:sE.toISOString(),matchFormat,scores:courts.map(()=>({s1:'',s2:'',tb:'',confirmed:false}))});
    }
    S.event={name:evNm,date:dateStr,startTime:startStr,courtCount:nc,sessionCount:sc,warmupMin:wu,sessionMin:sl,transMin:tr,balanceMode:bal,matchFormat,courtIds,chosenLayout:_chosenLayout,playerIds:[..._sel],lockedPairs:_pairs,sessions};
    saveE();
    if(bal==='manual'){S.sub='manual';}else{S.sub='play';S.sess=0;S.pv=false;}
    render();
  };

  // ── Init ──────────────────────────────────────────────────────────────────
  updPreview();
  updLayoutCard();   // also calls updChips + updCourtNumbers
  updPairSel();
}


function calcStandings(){
  if(!S.event)return[];
  const stats={};
  S.event.playerIds.forEach(id=>{
    const p=S.roster.find(x=>x.id===id);
    const evHistory=[];
    S.event.sessions.forEach(s=>{
      const sf=getFmt(S.event,s);
      s.courts.forEach((c,ci)=>{
        const sc=s.scores[ci];if(!sc||!sc.confirmed)return;
        const {g1,g2}=totalGames(sc,sf);
        if([...(c.team1||[]),...(c.team2||[])].some(x=>x&&x.id===id)){
          evHistory.push({
            team1:c.team1||[],team2:c.team2||[],
            score1:g1,score2:g2,
            sc,fmt:sf
          });
        }
      });
    });
    const _evRange=groupWtnRange(S.roster,S.event.playerIds);
    const sos=calcSOS(id,evHistory,S.roster,_evRange);
    const {exp}=calcExpectedWins(id,evHistory,S.roster,_evRange);
    stats[id]={id,name:p&&p.name||('Player '+id),w:0,l:0,gw:0,gl:0,sos,expWins:exp};
  });
  S.event.sessions.forEach(s=>{
    const sf=getFmt(S.event,s);
    s.courts.forEach((c,ci)=>{
      const sc=s.scores[ci];if(!sc||!sc.confirmed)return;
      const {g1,g2}=totalGames(sc,sf);
      const win=scoreWinner(sc,sf);
      (c.team1||[]).filter(Boolean).forEach(p=>{
        if(!stats[p.id])return;
        stats[p.id].gw+=g1;stats[p.id].gl+=g2;
        if(win===1)stats[p.id].w++;else if(win===2)stats[p.id].l++;
      });
      (c.team2||[]).filter(Boolean).forEach(p=>{
        if(!stats[p.id])return;
        stats[p.id].gw+=g2;stats[p.id].gl+=g1;
        if(win===2)stats[p.id].w++;else if(win===1)stats[p.id].l++;
      });
    });
  });
  return Object.values(stats).sort((a,b)=>{if(b.w!==a.w)return b.w-a.w;return(b.gw-b.gl)-(a.gw-a.gl);});
}

function renderLiveStandings(pg){
  const ev=S.event;
  const standings=calcStandings();
  const hasAny=ev.sessions.some(s=>s.scores.some(sc=>sc.confirmed));
  const card=mk('div','card');
  card.innerHTML=`<div class="ct">Live Standings</div>
  ${hasAny?`<table class="stbl"><thead><tr><th>#</th><th>Player</th><th>W-L</th><th>+/-</th><th>SOS</th><th>vs Exp</th></tr></thead>
  <tbody>${standings.map((s,i)=>{
    const d=s.gw-s.gl;
    const sl=s.sos||{label:'—',color:'var(--muted)'};sl.l=sl.label||sl.l||'—';
    const actualW=s.w;
    const over=s.expWins!==undefined?Math.round((actualW-s.expWins)*10)/10:null;
    const overStr=over!==null?(over>0?'+':'')+over:'—';
    const overCls=over!==null?(over>0?'dp':over<0?'dn':''):'';
    return '<tr class="'+(i<3?'r'+(i+1):'')+'"><td><div class="rank">'+(i+1)+'</div></td><td style="font-weight:500">'+esc(s.name)+'</td><td>'+s.w+'-'+s.l+'</td><td class="'+(d>=0?'dp':'dn')+'">'+(d>0?'+':'')+d+'</td><td style="font-size:.68rem;color:'+sl.c+'">'+sl.l+'</td><td style="font-size:.72rem" class="'+overCls+'">'+overStr+'</td></tr>';
  }).join('')}</tbody></table>`
  :`<div style="font-size:.78rem;color:var(--muted)">Confirm scores in the session cards below -- standings update here automatically.</div>`}`;
  pg.appendChild(card);
}

// ── Score entry builder — handles single set and multi-set formats ────────────
function buildScoreEntry(container, ci, sc, fmt, sess){
  const multi=isMultiSet(fmt);

  if(!multi){
    // ── Single set entry ──────────────────────────────────────────────────────
    const row=mk('div','score-row');row.id='srow-'+ci;
    const fmtLabel=mk('span');fmtLabel.style.cssText='font-size:.63rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;flex-shrink:0';
    fmtLabel.textContent=fmt.label;
    const i1=mk('input');i1.type='number';i1.min='0';i1.max=fmt.toWin+2;i1.className='sinp';i1.placeholder='0';i1.id='s1-'+ci;i1.value=sc.s1||'';
    const dash=mk('span','sdash');dash.textContent='-';
    const i2=mk('input');i2.type='number';i2.min='0';i2.max=fmt.toWin+2;i2.className='sinp';i2.placeholder='0';i2.id='s2-'+ci;i2.value=sc.s2||'';
    const errSpan=mk('span');errSpan.id='err-'+ci;errSpan.style.cssText='font-size:.65rem;color:var(--red);min-width:60px';
    const cfmb=mk('button','btn btn-p btn-sm');cfmb.id='cfm-'+ci;cfmb.textContent='Confirm ✓';cfmb.style.display='none';
    row.appendChild(fmtLabel);row.appendChild(i1);row.appendChild(dash);row.appendChild(i2);row.appendChild(errSpan);row.appendChild(cfmb);
    container.appendChild(row);

    // TB row
    const tbRow=mk('div');tbRow.id='tb-row-'+ci;

  } else {

    // Set rows — always show Set 1 and Set 2, unlock Set 3 when 1-1
    for(let si=0;si<3;si++){

      setRow.style.cssText='display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap';

      lbl.style.cssText='font-size:.65rem;color:var(--text-muted);min-width:36px;font-weight:600';
      lbl.textContent='S'+(si+1)+':';
      const si1=mk('input');si1.type='number';si1.min='0';si1.max=fmt.toWin+2;
      si1.className='sinp';si1.style.cssText='width:48px;text-align:center';si1.placeholder='0';
      si1.id='ss'+si+'s1-'+ci;
      si1.value=(sc.sets&&sc.sets[si]&&sc.sets[si].s1!==undefined)?sc.sets[si].s1:'';
      const sdash=mk('span','sdash');sdash.textContent='-';
      const si2=mk('input');si2.type='number';si2.min='0';si2.max=fmt.toWin+2;
      si2.className='sinp';si2.style.cssText='width:48px;text-align:center';si2.placeholder='0';
      si2.id='ss'+si+'s2-'+ci;
      si2.value=(sc.sets&&sc.sets[si]&&sc.sets[si].s2!==undefined)?sc.sets[si].s2:'';
      const serr=mk('span');serr.id='serr'+si+'-'+ci;serr.style.cssText='font-size:.6rem;color:var(--red)';

      setRow.appendChild(lbl);setRow.appendChild(si1);setRow.appendChild(sdash);setRow.appendChild(si2);setRow.appendChild(serr);

      const stbRow=mk('div');stbRow.id='stb-row-'+ci+'-'+si;

      const stbLbl=mk('span');
      // Fast4: 5pt TB; Super TB: 10pt; Standard: 7pt

      const stbdash=mk('span');stbdash.textContent='-';
      const stbi2=mk('input');stbi2.type='number';stbi2.min='0';stbi2.max='30';
      stbi2.className='sinp';stbi2.style.cssText='width:44px;text-align:center';
      stbi2.id='stb'+si+'i2-'+ci;

      stbRow.appendChild(stbLbl);stbRow.appendChild(stbi1);stbRow.appendChild(stbdash);stbRow.appendChild(stbi2);
      setRow.appendChild(stbRow);

    // Super tiebreak row (Best of 3 MTB: shows when 1-1 in sets)
    const superTbRow=mk('div');superTbRow.id='super-tb-'+ci;
    superTbRow.style.cssText='display:none;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap';
    const stLbl=mk('span');stLbl.style.cssText='font-size:.65rem;color:var(--green);min-width:36px;font-weight:700';
    stLbl.textContent=fmt.fast4?'S3:':'MTB:';
    const sti1=mk('input');sti1.type='number';sti1.min='0';sti1.max='30';
    sti1.className='sinp';sti1.style.cssText='width:48px;text-align:center';
    sti1.placeholder='0';sti1.id='super-tb-i1-'+ci;
    sti1.value=sc.supertb?sc.supertb.s1:'';
    const stdash=mk('span','sdash');stdash.textContent='-';
    const sti2=mk('input');sti2.type='number';sti2.min='0';sti2.max='30';
    sti2.className='sinp';sti2.style.cssText='width:48px;text-align:center';
    sti2.placeholder='0';sti2.id='super-tb-i2-'+ci;
    sti2.value=sc.supertb?sc.supertb.s2:'';

function wireScoreEntry(ci, fmt, sess){
  const sc=sess.scores[ci];
  const multi=isMultiSet(fmt);
  const errSpan=$('err-'+ci);
  const cfmb=$('cfm-'+ci);
  if(!cfmb) return;

  if(!multi){
    // ── Single set wiring ─────────────────────────────────────────────────────
    const i1=$('s1-'+ci),i2=$('s2-'+ci);
    const tbRow=$('tb-row-'+ci),tbI=$('tb-'+ci),tbI2=$('tb2-'+ci);
    if(!i1||!i2) return;

    const upd=()=>{
      const v=validateSetScore(i1.value,i2.value,fmt);
      if(errSpan) errSpan.textContent=v.error||'';
      if(tbRow) tbRow.style.display=v.isTb?'flex':'none';
      if(!sc.sets) sc.s1=i1.value,sc.s2=i2.value;
      sc.s1=i1.value;sc.s2=i2.value;
      if(!v.isTb){sc.tb='';sc.tb2='';}
      saveE();
      if(cfmb){
        const tbOk=!v.isTb||(tbI&&tbI2&&tbI.value!==''&&tbI2.value!=='');
        cfmb.style.display=(i1.value!==''&&i2.value!==''&&v.ok&&tbOk)?'':'none';
      }
    };
    i1.addEventListener('input',upd);i2.addEventListener('input',upd);
    if(tbI) tbI.addEventListener('input',()=>{sc.tb=tbI.value;saveE();upd();});
    if(tbI2) tbI2.addEventListener('input',()=>{sc.tb2=tbI2.value;saveE();upd();});
    cfmb.addEventListener('click',()=>{
      const v=validateSetScore(i1.value,i2.value,fmt);
      if(!v.ok){if(errSpan)errSpan.textContent=v.error||'Invalid';return;}
      sc.confirmed=true;saveE();render();
    });
    upd();

  } else {
    // ── Multi-set wiring ──────────────────────────────────────────────────────
    if(!sc.sets) sc.sets=[];

    const updMulti=()=>{
      // Validate each visible set, count sets won
      let s1won=0,s2won=0,allValid=true,anyErr='';
      const setCount=fmt.s3type==='supertb'?2:3; // MTB only needs 2 main sets + super TB
      const visibleSets=fmt.s3type==='supertb'?2:3;

      for(let si=0;si<2;si++){
        const i1=$('ss'+si+'s1-'+ci),i2=$('ss'+si+'s2-'+ci);
        if(!i1||!i2){allValid=false;continue;}
        if(i1.value===''||i2.value==='') continue;
        if(!sc.sets[si]) sc.sets[si]={};
        sc.sets[si].s1=i1.value;sc.sets[si].s2=i2.value;
        const v=validateSetScore(i1.value,i2.value,fmt);
        const serr=$('serr'+si+'-'+ci);
        if(serr) serr.textContent=v.error||'';
        // TB for this set
        const stbRow=$('stb-row-'+ci+'-'+si);
        if(stbRow) stbRow.style.display=v.isTb?'flex':'none';
        if(v.isTb){
          const tb1=$('stb'+si+'i1-'+ci),tb2=$('stb'+si+'i2-'+ci);
          if(tb1&&tb2){sc.sets[si].tb1=tb1.value;sc.sets[si].tb2=tb2.value;}
        } else {
          if(sc.sets[si]){sc.sets[si].tb1='';sc.sets[si].tb2='';}
        }
        if(v.isComplete||v.isTb){
          const v1p=parseInt(i1.value),v2p=parseInt(i2.value);
          // Determine set winner — if TB, winner is whoever has more TB points
          let sw=0;
          if(v.isTb){
            const tb1=$('stb'+si+'i1-'+ci),tb2=$('stb'+si+'i2-'+ci);
            const t1=parseInt(tb1&&tb1.value||0),t2=parseInt(tb2&&tb2.value||0);
            if(t1>t2)sw=1;else if(t2>t1)sw=2;
          } else {
            sw=v1p>v2p?1:v2p>v1p?2:0;
          }
          if(sw===1)s1won++;else if(sw===2)s2won++;
        }
        if(!v.ok&&!v.isTb&&i1.value!==''&&i2.value!==''){allValid=false;anyErr='Check set '+(si+1);}
      }
      saveE();

      // Show/hide set 3 or super TB based on set count
      const tied=(s1won===1&&s2won===1);
      const superTbRow=$('super-tb-'+ci);
      const s3row=$('set-row-'+ci+'-2');

      if(fmt.s3type==='supertb'){
        // Best of 3 MTB: show super TB when 1-1
        if(superTbRow) superTbRow.style.display=tied?'flex':'none';
        if(s3row) s3row.style.display='none';
      } else {
        // Best of 3 full sets or Fast Four: show set 3 when 1-1
        if(s3row) s3row.style.display=tied?'flex':'none';
        if(superTbRow) superTbRow.style.display='none';
        if(tied){
          // Wire set 3
          const i1=$('ss2s1-'+ci),i2=$('ss2s2-'+ci);
          if(i1&&i2){
            sc.sets[2]=sc.sets[2]||{};
            sc.sets[2].s1=i1.value;sc.sets[2].s2=i2.value;
            const v=validateSetScore(i1.value,i2.value,fmt);
            const serr=$('serr2-'+ci);if(serr) serr.textContent=v.error||'';
            const stbRow=$('stb-row-'+ci+'-2');
            if(stbRow) stbRow.style.display=v.isTb?'flex':'none';
            if(v.isComplete||v.isTb){
              const v1p=parseInt(i1.value),v2p=parseInt(i2.value);
              let sw=0;
              if(v.isTb){
                const tb1=$('stb2i1-'+ci),tb2=$('stb2i2-'+ci);
                const t1=parseInt(tb1&&tb1.value||0),t2=parseInt(tb2&&tb2.value||0);
                if(t1>t2)sw=1;else if(t2>t1)sw=2;
              } else {sw=v1p>v2p?1:v2p>v1p?2:0;}
              if(sw===1)s1won++;else if(sw===2)s2won++;
            }
          }
        }
      }

      // Handle super TB data
      if(fmt.s3type==='supertb'&&tied){
        const sti1=$('super-tb-i1-'+ci),sti2=$('super-tb-i2-'+ci);
        if(sti1&&sti2){
          if(!sc.supertb) sc.supertb={};
          sc.supertb.s1=sti1.value;sc.supertb.s2=sti2.value;
          if(sti1.value!==''&&sti2.value!==''){
            const sv1=parseInt(sti1.value),sv2=parseInt(sti2.value);
            if(sv1>sv2)s1won++;else if(sv2>sv1)s2won++;
          }
        }
      }

      // Update sc.s1/s2 as total games for backward compat
      let tg1=0,tg2=0;
      (sc.sets||[]).forEach(st=>{tg1+=parseInt(st.s1)||0;tg2+=parseInt(st.s2)||0;});
      if(sc.supertb){tg1+=parseInt(sc.supertb.s1)||0;tg2+=parseInt(sc.supertb.s2)||0;}
      sc.s1=tg1;sc.s2=tg2;
      saveE();

      // Determine if match is complete
      const matchDone=(s1won>=2||s2won>=2);
      if(errSpan) errSpan.textContent=anyErr;
      if(cfmb) cfmb.style.display=(matchDone&&allValid)?'':'none';
    };

    // Wire set 1 and 2 inputs
    for(let si=0;si<3;si++){
      const i1=$('ss'+si+'s1-'+ci),i2=$('ss'+si+'s2-'+ci);
      if(i1) i1.addEventListener('input',updMulti);
      if(i2) i2.addEventListener('input',updMulti);
      const tb1=$('stb'+si+'i1-'+ci),tb2=$('stb'+si+'i2-'+ci);
      if(tb1) tb1.addEventListener('input',updMulti);
      if(tb2) tb2.addEventListener('input',updMulti);
    }
    const sti1=$('super-tb-i1-'+ci),sti2=$('super-tb-i2-'+ci);
    if(sti1) sti1.addEventListener('input',updMulti);
    if(sti2) sti2.addEventListener('input',updMulti);

    cfmb.addEventListener('click',()=>{
      sc.confirmed=true;saveE();render();
    });
    updMulti();
  }
}

// ── Player Swap Modal ────────────────────────────────────────────────────────
function showSwapModal(sess, courtIdx, teamIdx, playerIdx){
  const court = sess.courts[courtIdx];
  const team  = teamIdx===1 ? court.team1 : court.team2;
  const current = team[playerIdx];
  if(!current) return;

  const overlay = mk('div','modal-overlay');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9000;display:flex;align-items:center;justify-content:center;padding:16px;';
  const box = mk('div','');
  box.style.cssText='background:var(--surface);border-radius:14px;padding:20px;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(0,0,0,.4);';
  box.innerHTML=`<div style="font-size:.95rem;font-weight:700;color:var(--text);margin-bottom:4px">Swap Player</div>
    <div style="font-size:.78rem;color:var(--text-muted);margin-bottom:14px">Swapping out: <strong style="color:var(--text)">${esc(current.name)}</strong> — tap a player to swap in</div>
    <div id="swap-grid" style="display:flex;flex-direction:column;gap:5px;max-height:55vh;overflow-y:auto;"></div>
    <button id="swap-cancel" class="btn btn-s btn-sm" style="width:100%;margin-top:14px">Cancel</button>`;
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  box.querySelector('#swap-cancel').onclick = ()=>document.body.removeChild(overlay);
  overlay.onclick = e=>{ if(e.target===overlay) document.body.removeChild(overlay); };

  // Build list of all players in this session, grouped by court
  const grid = box.querySelector('#swap-grid');
  sess.courts.forEach((c, ci)=>{
    [[c.team1,1],[c.team2,2]].forEach(([t,ti])=>{
      (t||[]).filter(Boolean).forEach((p,pi)=>{
        if(p.id===current.id) return; // skip self
        const row = mk('div','');
        const isSameCourt = ci===courtIdx;
        row.style.cssText=`display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;cursor:pointer;border:1px solid var(--border);background:${isSameCourt?'var(--surface2)':'var(--surface)'};`;
        const bw = bestWtnStr(S.roster.find(r=>r.id===p.id)||p);
        row.innerHTML=`<div><div style="font-size:.85rem;font-weight:600;color:var(--text)">${esc(p.name)}</div><div style="font-size:.65rem;color:var(--text-muted)">Court ${esc(c.courtId)} · Team ${ti}${isSameCourt?' · same court':''} ${bw?'· '+bw:''}</div></div><span style="font-size:.75rem;color:var(--green);font-weight:600">Swap →</span>`;
        row.onmouseenter = ()=>row.style.background='var(--surface2)';
        row.onmouseleave = ()=>row.style.background=isSameCourt?'var(--surface2)':'var(--surface)';
        row.onclick = ()=>{
          // Swap: put current into p's slot, put p into current's slot
          const targetTeam = ti===1 ? c.team1 : c.team2;
          team[playerIdx] = p;
          targetTeam[pi]  = current;
          saveE();
          document.body.removeChild(overlay);
          render();
        };
        grid.appendChild(row);
      });
    });
  });
}

function renderPlay(pg){
  if(!S.event){pg.innerHTML='<div class="empty">No active event.</div>';return;}
  if(S.pv){renderPlayerView(pg);return;}
  const ev=S.event;
  renderLiveStandings(pg);

  const tabs=mk('div','tabbar');
  ev.sessions.forEach((_,i)=>{const b=mk('button',S.sess===i?'on':'');b.textContent='Session '+(i+1);b.onclick=()=>{S.sess=i;render();};tabs.appendChild(b);});
  pg.appendChild(tabs);

  const sess=ev.sessions[S.sess];
  if(!sess){pg.innerHTML='<div class="empty">Session not found. <button class="btn btn-s btn-sm" onclick="S.sub=\'setup\';render()">Back to Setup</button></div>';return;}
  const sS=new Date(sess.startTime),sE=new Date(sess.endTime);
  const shdr=mk('div','shdr');
  const tmrSpan=mk('span','tmr ok');
  shdr.innerHTML=`<div><div class="sess-label">Session ${S.sess+1}${ev.name?' -- '+esc(ev.name):''}</div><div style="font-size:.72rem;color:var(--muted)">${fT(sS)} - ${fT(sE)}</div></div>`;
  const rbox=mk('div');rbox.innerHTML=`<div style="font-size:.6rem;color:var(--muted);text-align:right;margin-bottom:2px">TIME LEFT</div>`;
  rbox.appendChild(tmrSpan);
  const rb=ev.balanceMode==='manual'?null:mk('button','btn btn-s btn-sm','Re-roll');
  if(rb) rb.onclick=()=>{reroll(S.sess);render();};
  const rbw=mk('div');rbw.style.cssText='display:flex;gap:8px;align-items:center';rbw.appendChild(rbox);if(rb)rbw.appendChild(rb);
  shdr.appendChild(rbw);pg.appendChild(shdr);

  // ── Session progress bar ────────────────────────────────────────────────────
  const totalCourts=sess.courts.length;
  const confirmedCount=sess.scores.filter(sc=>sc&&sc.confirmed).length;
  if(totalCourts>0){
    const progressBar=mk('div');
    progressBar.style.cssText='margin-bottom:10px;';
    const pct=Math.round(confirmedCount/totalCourts*100);
    const allDone=confirmedCount===totalCourts;
    progressBar.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <span style="font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px">${confirmedCount}/${totalCourts} Confirmed</span>
      ${allDone?'<span style="font-size:.65rem;color:var(--green);font-weight:600">✓ Session Complete</span>':''}
    </div>
    <div style="height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;border:1px solid var(--border)">
      <div style="height:100%;width:${pct}%;background:${allDone?'var(--gold)':'var(--green)'};border-radius:3px;transition:width .4s"></div>
    </div>`;
    pg.appendChild(progressBar);
  }
  // ───────────────────────────────────────────────────────────────────────────
  let timerStarted=S.event._timerStarted&&S.event._timerStarted[S.sess]||false;
  let timerEnd=S.event._timerEnd&&S.event._timerEnd[S.sess]||null;
  const sl_ms=(ev.sessionMin||35)*60000;

  const tick=()=>{
    if(!timerStarted){
      tmrSpan.textContent=p2(ev.sessionMin||35)+':00';
      tmrSpan.className='tmr ok';
      return;
    }
    const diff=new Date(timerEnd)-new Date();
    if(diff<=0){tmrSpan.textContent='TIME';tmrSpan.className='tmr urgent';return;}
    tmrSpan.textContent=p2(Math.floor(diff/60000))+':'+p2(Math.floor((diff%60000)/1000));
    tmrSpan.className='tmr '+(diff<3*60000?'urgent':diff<7*60000?'warn':'ok');
  };

  const startBtn=mk('button','btn btn-p btn-sm',timerStarted?'&#9654; Running':'&#9654; Start Timer');
  startBtn.style.cssText=timerStarted?'background:var(--muted);cursor:default':'';
  startBtn.onclick=()=>{
    if(timerStarted)return;
    timerStarted=true;
    const endTime=new Date(Date.now()+sl_ms).toISOString();
    if(!S.event._timerStarted)S.event._timerStarted={};
    if(!S.event._timerEnd)S.event._timerEnd={};
    S.event._timerStarted[S.sess]=true;
    S.event._timerEnd[S.sess]=endTime;
    timerEnd=endTime;
    saveE();
    startBtn.innerHTML='&#9654; Running';
    startBtn.style.cssText='background:var(--muted);cursor:default';
  };
  rbw.insertBefore(startBtn,rb);

  tick();_timers.push(setInterval(tick,1000));

  const _sessFmt=getFmt(ev,sess);
  const _isMulti=isMultiSet(_sessFmt);

  sess.courts.forEach((court,ci)=>{
    // Ensure score object has correct structure for this format
    if(!sess.scores[ci]) sess.scores[ci]={confirmed:false};
    const sc=sess.scores[ci];
    const conf=!!sc.confirmed;
    const _sf=_sessFmt;
    const win=conf?scoreWinner(sc,_sf):null;
    const tossTeam=court.toss===0?court.team1:court.team2;
    const tossName=(tossTeam&&tossTeam[0]&&tossTeam[0].name)||'Team '+(court.toss+1);
    const isD=court.fmt==='doubles';
    const cc=mk('div','ccard');

    // Team display — use roster for enriched WTN data
    const t1full=(court.team1||[]).filter(Boolean).map(p=>S.roster.find(r=>r.id===p.id)||p);
    const t2full=(court.team2||[]).filter(Boolean).map(p=>S.roster.find(r=>r.id===p.id)||p);

    // Build tappable player cells (swap-enabled when not confirmed)
    function makeTeamEl(tfull, teamIdx, winSide){
      const wrap=mk('div','team'+(teamIdx===2?' r':''));
      tfull.forEach((p,pi)=>{
        const cell=mk('div','');
        cell.style.cssText='position:relative;'+(conf?'':'cursor:pointer;');
        const {str:wtnStr, note:wtnNote}=courtWtnStr(p, isD);
        const nameEl=mk('div','pname');
        nameEl.innerHTML=(winSide===teamIdx?'&#10003; ':'')+esc(p.name);
        if(!conf){
          nameEl.style.cssText='font-weight:600;font-size:.9rem;color:var(--text);text-decoration:underline dotted var(--text-muted);text-underline-offset:3px;cursor:pointer;';
          nameEl.title='Tap to swap '+p.name;
          nameEl.onclick=(e)=>{e.stopPropagation();showSwapModal(sess,ci,teamIdx,pi);};
        }
        cell.appendChild(nameEl);
        if(wtnStr){
          const wEl=mk('div','pwtn');
          wEl.title=wtnTooltip(p);
          wEl.textContent=wtnStr+(wtnNote?' ('+wtnNote+')':'');
          if(wtnNote) wEl.style.color='var(--gold)';
          cell.appendChild(wEl);
        }
        wrap.appendChild(cell);
      });
      if(winSide===teamIdx){const wb=mk('div','win-badge win'+teamIdx);if(teamIdx===2)wb.style.marginLeft='auto';wb.textContent='WINNER';wrap.appendChild(wb);}
      return wrap;
    }
    const t1El=makeTeamEl(t1full,1,win);
    const t2El=makeTeamEl(t2full,2,win);

    // Prediction
    const _range=groupWtnRange(S.roster,ev.playerIds);
    const _t1=(court.team1||[]).filter(Boolean).map(p=>S.roster.find(r=>r.id===p.id)||p);
    const _t2=(court.team2||[]).filter(Boolean).map(p=>S.roster.find(r=>r.id===p.id)||p);
    const _t1c=teamCombinedWtn(_t1,S.roster),_t2c=teamCombinedWtn(_t2,S.roster);
    let predHtml='';
    if(_t1c!==null&&_t2c!==null&&_range){
      const _learned=winProbLearned(_t1,_t2,S.roster,_range,S.history);
      const prob1=_learned.prob!==null?_learned.prob:winProbRelative(_t1,_t2,S.roster,_range);
      const predSc=predictSetScore(prob1,_sf);
      const favTeam=prob1>=0.5?_t1:_t2;
      const favName=favTeam.map(p=>p.name.split(' ')[0]).join('/');
      const favProb=Math.round(Math.max(prob1,1-prob1)*100);
      const gapStr='Combined WTN: '+_t1c.toFixed(1)+' vs '+_t2c.toFixed(1)+' (gap: '+(Math.abs(_t1c-_t2c).toFixed(1))+' of '+(_range.spread||0).toFixed(1)+' group spread)';
      const adjBadge=_learned.adjusted?'<span style="font-size:.58rem;background:var(--green);color:#fff;padding:1px 5px;border-radius:8px;margin-left:4px">&#9889; History</span>':'';
      predHtml='<div style="font-size:.62rem;color:var(--text-muted);text-align:center;padding:3px 6px;border-top:1px solid var(--border);margin-top:4px" title="'+gapStr+'">&#127919; '+_sf.label+' &nbsp;|&nbsp; Predicted: <span style="color:var(--green)">'+predSc+'</span> &nbsp;|&nbsp; <span style="color:var(--green)">'+favName+'</span> <span style="color:var(--green)">'+favProb+'%</span>'+adjBadge+'</div>';
    }

    // Confirmed score display
    let confirmedHtml='';
    if(conf){
      const disp=scoreDisplay(sc,_sf);
      confirmedHtml='<div class="score-row">'
        +'<span style="font-size:.63rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;flex-shrink:0">'+_sf.label+'</span>'
        +'<span style="font-family:monospace;font-size:1.2rem;font-weight:700;color:var(--green)">'+esc(disp||'')+'</span>'
        +'<span class="conf-badge">&#10003; Confirmed</span>'
        +'</div>';
    }

    cc.innerHTML='<div class="chdr"><div class="cname">Court '+esc(court.courtId)+' <span class="fbadge '+(isD?'fd':'fs')+'">'+(isD?'Doubles':'Singles')+'</span>'+(court.isTrial?'<span class="trial-badge" style="margin-left:4px">🧪 Trial</span>':'')+'</div><div class="toss-badge">&#127922; '+esc(tossName)+' won toss</div></div>'
      +'<div class="tgrid" id="tgrid-'+ci+'"></div>'
      +predHtml
      +(conf?confirmedHtml:'');

    // Wire DOM team elements into tgrid (must happen after innerHTML is set)
    const tgridEl=cc.querySelector('#tgrid-'+ci);
    if(tgridEl){
      const vsEl=mk('div','vs-txt');vsEl.textContent='VS';
      tgridEl.appendChild(t1El);
      tgridEl.appendChild(vsEl);
      tgridEl.appendChild(t2El);
    }

    if(!conf){
      // Build score entry for this format
      buildScoreEntry(cc, ci, sc, _sf, sess);
    }

    pg.appendChild(cc);
  });

  // Wire all score inputs
  sess.courts.forEach((_,ci)=>{
    wireScoreEntry(ci, _sessFmt, sess);
  });

  // Per-session format override pill
  const fmtRow=mk('div');
  fmtRow.style.cssText='display:flex;align-items:center;gap:8px;margin:6px 0;flex-wrap:wrap';
  fmtRow.innerHTML='<span style="font-size:.7rem;color:var(--muted)">Session format:</span>';
  Object.entries(MATCH_FORMATS).forEach(([k,f])=>{
    const btn=mk('button','btn btn-s btn-sm'+(sess.matchFormat===k||(k==='no-ad'&&!sess.matchFormat&&ev.matchFormat==='no-ad')||(sess.matchFormat||ev.matchFormat||'no-ad')===k?' sel':''));
    btn.textContent=f.label;
    btn.style.cssText='font-size:.65rem;padding:3px 8px';
    btn.onclick=()=>{sess.matchFormat=k;saveE();render();};
    fmtRow.appendChild(btn);
  });
  pg.insertBefore(fmtRow, pg.querySelector('#srow-0')&&pg.querySelector('#srow-0').parentElement||pg.lastChild);

  const btnRow=mk('div');btnRow.style.cssText='display:flex;gap:8px;margin-top:8px';

  const backBtn=mk('button','btn btn-s','← Back to Setup');
  backBtn.style.cssText='flex:1;padding:12px;font-size:.88rem';
  backBtn.onclick=function(){
    S.event.sessions=[];
    S.sub='setup';
    saveE();
    render();
  };

  const fin=mk('button','btn btn-p','View Final Results');
  fin.style.cssText='flex:2;padding:12px;font-size:.95rem';
  fin.onclick=()=>{commitHistory();S.sub='results';render();};

  const shareCardBtnPlay=mk('button','btn btn-s','📤');
  shareCardBtnPlay.title='Share Results Card';
  shareCardBtnPlay.style.cssText='flex:0 0 44px;padding:12px;font-size:.95rem';
  shareCardBtnPlay.onclick=()=>{commitHistory();showShareCardModal();};

  btnRow.appendChild(backBtn);
  btnRow.appendChild(fin);
  btnRow.appendChild(shareCardBtnPlay);
  pg.appendChild(btnRow);
}


function reroll(si){
  const ev=S.event;
  const ph=[];
  const mh=new Set();
  ev.sessions.slice(0,si).forEach(function(s){
    const h={};
    (s.courts||[]).forEach(function(c){
      const t1=(c.team1||[]).filter(Boolean),t2=(c.team2||[]).filter(Boolean);
      if(t1.length>=2){h[t1[0].id]=t1[1].id;h[t1[1].id]=t1[0].id;}
      if(t2.length>=2){h[t2[0].id]=t2[1].id;h[t2[1].id]=t2[0].id;}
      if(t1.length&&t2.length) mh.add(matchupKey(t1,t2));
    });
    ph.push(h);
  });
  const players=S.roster.filter(function(p){return ev.playerIds.includes(p.id);});
  const lay=ev.chosenLayout;
  ev.sessions[si].courts=genPairings({players:players,locked:ev.lockedPairs||[],bal:ev.balanceMode,hist:ph,matchupHist:mh,courtIds:ev.courtIds,dC:lay.dC,sC:lay.sC});
  ev.sessions[si].scores=ev.sessions[si].courts.map(function(){return {s1:'',s2:'',confirmed:false};});
  saveE();
}

function commitHistory(){
  const ev=S.event;if(!ev)return;
  ev.sessions.forEach((s,si)=>{
    const sf=getFmt(ev,s);
    s.courts.forEach((court,ci)=>{
      const sc=s.scores[ci];if(!sc||!sc.confirmed)return;
      const key=ev.date+'-'+si+'-'+ci;
      if(S.history.some(h=>h._k===key))return;
      const {g1,g2}=totalGames(sc,sf);
      S.history.push({
        _k:key,
        date:ev.date,
        eventName:ev.name||'',
        sessionLabel:'Session '+(si+1),
        court:court.courtId,
        fmt:court.fmt||'doubles',
        matchFmt:sf.label,
        matchFmtKey:Object.keys(MATCH_FORMATS).find(k=>MATCH_FORMATS[k]===sf)||'no-ad',
        matchType:'squad',
        isTrial:court.isTrial||false,
        trialPlayerId:court.trialPlayerId||null,
        focalPlayerId:court.focalPlayerId||null,
        team1:(court.team1||[]).filter(Boolean).map(p=>({id:p.id,name:p.name,wtn:p.wtn,wtnSource:p.wtnSource})),
        team2:(court.team2||[]).filter(Boolean).map(p=>({id:p.id,name:p.name,wtn:p.wtn,wtnSource:p.wtnSource})),
        score1:g1,score2:g2,
        scoreRich:JSON.stringify(sc)
      });
    });
  });
  saveH();
}

      ${isD&&partner?`<div style="font-size:.88rem">Partner: <strong>${esc(partner.name)}</strong></div>`:''}
      <div style="font-size:.78rem;color:var(--muted);margin-top:3px">vs. ${(op||[]).filter(Boolean).map(p=>esc(p.name)).join(' & ')}</div>

// ── SHAREABLE SESSION RESULTS CARD ───────────────────────────────────────────
function buildShareCardHTML(ev, standings, range){
  const evName=ev&&ev.name||'Squad Session';
  const evDate=fD(ev&&ev.date||'');
  const sessCount=(ev.sessions||[]).length;
  const playerCount=(ev.playerIds||[]).length;

  // All confirmed matches across ALL sessions
  const totalConfirmed=(ev.sessions||[]).reduce((n,s)=>n+s.scores.filter(sc=>sc&&sc.confirmed).length,0);

  // ── Per-player analytics using CURRENT SESSION history (not all-time) ──────
  // Only include matches from this event so the card reflects tonight
  const evMatchKeys=new Set();
  (ev.sessions||[]).forEach((s,si)=>{
    s.courts.forEach((_,ci)=>{if(s.scores[ci]&&s.scores[ci].confirmed)evMatchKeys.add(ev.date+'-'+si+'-'+ci);});
  });
  const evHistory=S.history.filter(h=>evMatchKeys.has(h._k));

  const playersWithData=standings.map(st=>{
    const pid=st.id;
    const mm=evHistory.filter(h=>[...h.team1,...h.team2].some(p=>p.id===pid));
    const isW=h=>{const t1=h.team1.some(p=>p.id===pid);return t1?h.score1>h.score2:h.score2>h.score1;};
    const wins=mm.filter(isW).length;
    const {exp:expW,tot:expTot}=calcExpectedWins(pid,mm,S.roster,range);
    const over=expTot>0?Math.round((wins-expW)*10)/10:null;
    return{...st,over,expTot,mm:mm.length};
  });

  // ── MVP: highest vs Expected with at least 2 matches ─────────────────────
  const mvpCandidates=playersWithData.filter(p=>p.expTot>0&&p.over!==null&&p.mm>=2);
  const mvp=mvpCandidates.sort((a,b)=>b.over-a.over)[0]||null;

  // ── Decide whether to show vs Expected column ─────────────────────────────
  // Only show if at least half the top-6 players have data
  const top6=standings.slice(0,6);
  const top6WithData=playersWithData.slice(0,6).filter(p=>p.over!==null&&p.mm>=2);
  const showVse=top6WithData.length>=Math.ceil(top6.length/2);

  // ── Highlight moment: find best upset, or closest match ───────────────────
  // Scan all confirmed matches across all sessions
  let highlight=null;
  if(totalConfirmed>=3){
    let bestUpset=null,closestMatch=null,bestUpsetGap=1,closestMargin=999;
    (ev.sessions||[]).forEach(s=>{
      const sessFmt=getFmt(ev,s);
      s.courts.forEach((c,ci)=>{
        const sc=s.scores[ci];if(!sc||!sc.confirmed)return;
        const t1=(c.team1||[]).filter(Boolean).map(p=>S.roster.find(r=>r.id===p.id)||p);
        const t2=(c.team2||[]).filter(Boolean).map(p=>S.roster.find(r=>r.id===p.id)||p);
        const t1c=teamCombinedWtn(t1,S.roster),t2c=teamCombinedWtn(t2,S.roster);
        const prob=(range&&t1c!==null&&t2c!==null)?winProbRelative(t1,t2,S.roster,range):null;
        const {g1,g2}=totalGames(sc,sessFmt);
        const win=g1>g2?1:g2>g1?2:0;
        const margin=Math.abs(g1-g2);
        // Upset: underdog won (prob < 0.40 for team1 win, or >0.60 for team2 win)
        if(prob!==null){
          const upsetProb=win===1?prob:1-prob; // prob the winner was given
          const upsetStrength=win===1?(0.5-prob):(prob-0.5); // how big the upset
          if(upsetProb<0.40&&upsetStrength>bestUpsetGap-0.5){
            const winTeam=win===1?t1:t2;
            const loseTeam=win===1?t2:t1;
            const winNames=winTeam.map(p=>p.name.split(' ')[0]).join(' & ');
            const loseNames=loseTeam.map(p=>p.name.split(' ')[0]).join(' & ');
            const favPct=Math.round((1-upsetProb)*100);
            bestUpset={
              icon:'🔥',title:'UPSET',
              detail:`${winNames} def. ${loseNames} — model gave them only ${Math.round(upsetProb*100)}% (${g1}-${g2})`
            };
            bestUpsetGap=upsetStrength;
          }
        }
        // Closest match by margin
        if(margin<closestMargin&&win!==0){
          const winTeam=win===1?t1:t2;
          const loseTeam=win===1?t2:t1;
          const winNames=winTeam.map(p=>p.name.split(' ')[0]).join(' & ');
          const loseNames=loseTeam.map(p=>p.name.split(' ')[0]).join(' & ');
          closestMatch={
            icon:'⚡',title:'CLOSEST MATCH',
            detail:`${winNames} def. ${loseNames} · ${g1}-${g2}`
          };
          closestMargin=margin;
        }
      });
    });
    highlight=bestUpset||closestMatch;
  }

  // ── Build standings rows ──────────────────────────────────────────────────
  const medalEmoji=['🥇','🥈','🥉'];
  const rowsHtml=top6.map((s,i)=>{
    const pd=playersWithData[i];
    const over=pd&&showVse&&pd.over!==null&&pd.mm>=2?pd.over:null;
    const overColor=over>0?'#6dd99a':over<0?'#ff8a80':'rgba(255,255,255,.45)';
    const overStr=over!==null?(over>0?'+':'')+over:null;
    return `<div class="scard-row">
      <div class="scard-rank">${i<3?medalEmoji[i]:(i+1)}</div>
      <div class="scard-pname">${esc(s.name)}</div>
      <div class="scard-record">${s.w}-${s.l}</div>
      ${showVse?`<div class="scard-vse" style="color:${overStr?overColor:'rgba(255,255,255,.2)'}">${overStr||'—'}</div>`:''}
    </div>`;
  }).join('');

  // ── MVP block ─────────────────────────────────────────────────────────────
  const mvpHtml=mvp?`<div class="scard-mvp">
    <div class="scard-mvp-icon">⭐</div>
    <div>
      <div class="scard-mvp-name">${esc(mvp.name)}</div>
      <div class="scard-mvp-sub">${mvp.w}-${mvp.l} record · ${mvp.over>0?'+'+mvp.over:mvp.over} vs Expected</div>
      <div class="scard-mvp-sub" style="margin-top:1px;color:rgba(255,255,255,.35);font-size:.6rem">Outperformed the prediction model by ${mvp.over>0?'+'+mvp.over:mvp.over} wins tonight</div>
    </div>
  </div>`:'';

  // ── Highlight block ───────────────────────────────────────────────────────
  const highlightHtml=highlight?`<div class="scard-highlight">
    <div class="scard-highlight-icon">${highlight.icon}</div>
    <div>
      <div class="scard-highlight-title">${highlight.title}</div>
      <div class="scard-highlight-detail">${highlight.detail}</div>
    </div>
  </div>`:'';

  // ── Column header (only if showing vse) ──────────────────────────────────
  const colHdr=`<div class="scard-col-hdr">
    <div class="scard-col-hdr-label">Player</div>
    <div style="margin-left:auto;display:flex;gap:18px;align-items:center">
      <div class="scard-col-hdr-label">W-L</div>
      ${showVse?'<div class="scard-col-hdr-vse">vs Exp</div>':''}
    </div>
  </div>`;

  // ── Stats line ────────────────────────────────────────────────────────────
  const statsLine=`${playerCount} Players · ${sessCount} Session${sessCount!==1?'s':''} · ${totalConfirmed} Match${totalConfirmed!==1?'es':''} Played`;

  return `<div class="scard" id="share-card-inner">
    <div class="scard-logo">HELIX | SQUADS</div>
    <div class="scard-event">${esc(evName)}</div>
    <div class="scard-meta">${evDate?evDate+' · ':''}${statsLine}</div>
    <div class="scard-divider"></div>
    ${mvpHtml}
    ${highlightHtml}
    <div class="scard-section-label">Final Standings</div>
    ${colHdr}
    <div class="scard-standings">${rowsHtml}</div>
    ${showVse?'<div style="font-size:.56rem;color:rgba(255,255,255,.22);margin-top:8px;line-height:1.5">vs Expected = wins above/below what the WTN prediction model forecast for this group</div>':''}
    <div class="scard-footer">
      <div class="scard-footer-brand">Play Smarter. Win More.</div>
      <div style="font-size:.58rem;color:rgba(255,255,255,.2);letter-spacing:.5px">HELIX Squads</div>
    </div>
  </div>`;
}

      s.courts.forEach((_,ci)=>{if(s.scores[ci]&&s.scores[ci].confirmed)evMatchKeys.add(ev.date+'-'+si+'-'+ci);});
    });
    const evHistory=S.history.filter(h=>evMatchKeys.has(h._k));
    const lines=[
      '🎾 '+(ev.name||'Squad Session')+(ev.date?' — '+fD(ev.date):''),

    ];
    standings.slice(0,6).forEach((s,i)=>{
      const mm=evHistory.filter(h=>[...h.team1,...h.team2].some(p=>p.id===s.id));
      const isW=h=>{const t1=h.team1.some(p=>p.id===s.id);return t1?h.score1>h.score2:h.score2>h.score1;};
      const wins=mm.filter(isW).length;
      const {exp:expW,tot:expTot}=calcExpectedWins(s.id,mm,S.roster,range);
      const over=expTot>0&&mm.length>=2?Math.round((wins-expW)*10)/10:null;
      const medal=['🥇','🥈','🥉'][i]||(i+1)+'.';
      lines.push(`${medal} ${s.name}  ${s.w}-${s.l}${over!==null?'  ('+( over>0?'+':'')+over+' vs Expected)':''}`);

  };

  // Share — native Web Share API on mobile, clipboard fallback
  const shareBtn=mk('button','btn btn-p');
  shareBtn.style.cssText='flex:2;font-size:.82rem';
  shareBtn.innerHTML='📤 Share to Chat';
  shareBtn.onclick=()=>{
    const evMatchKeys=new Set();
    (ev.sessions||[]).forEach((s,si)=>{
      s.courts.forEach((_,ci)=>{if(s.scores[ci]&&s.scores[ci].confirmed)evMatchKeys.add(ev.date+'-'+si+'-'+ci);});
    });
    const evHistory=S.history.filter(h=>evMatchKeys.has(h._k));
    const top=standings.slice(0,3).map((s,i)=>{
      const mm=evHistory.filter(h=>[...h.team1,...h.team2].some(p=>p.id===s.id));
      const isW=h=>{const t1=h.team1.some(p=>p.id===s.id);return t1?h.score1>h.score2:h.score2>h.score1;};
      const wins=mm.filter(isW).length;
      const {exp:expW,tot:expTot}=calcExpectedWins(s.id,mm,S.roster,range);
      const over=expTot>0&&mm.length>=2?Math.round((wins-expW)*10)/10:null;
      return ['🥇','🥈','🥉'][i]+' '+s.name+'  '+s.w+'-'+s.l+(over!==null?'  ('+(over>0?'+':'')+over+' vs Exp)':'');
    }).join('\n');
    const txt='🎾 '+(ev.name||'Squad Session')+(ev.date?' — '+fD(ev.date):'')+'\n\n'+top+'\n\nPowered by HELIX Squads — Play Smarter. Win More.';
    if(navigator.share){
      navigator.share({title:'HELIX Squads — '+( ev.name||'Results'),text:txt}).catch(()=>{});
    } else {
      navigator.clipboard&&navigator.clipboard.writeText(txt).then(()=>{
        shareBtn.innerHTML='✅ Copied!';
        setTimeout(()=>{shareBtn.innerHTML='📤 Share to Chat';},2500);
      });
    }
  };

  actions.appendChild(copyBtn);
  actions.appendChild(shareBtn);
  modal.appendChild(actions);
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
}

function generateReport(){

  const evDate=fD(ev&&ev.date||'');
  const evName=ev&&ev.name||'HELIX | SQUADS';

  // ── Compute per-player analytics for report ──
  const playerData=standings.map(st=>{
    const pid=st.id, player=S.roster.find(p=>p.id===pid);
    const mm=S.history.filter(h=>[...h.team1,...h.team2].some(p=>p.id===pid));
    const isW=h=>{const t1=h.team1.some(p=>p.id===pid);return t1?h.score1>h.score2:h.score2>h.score1;};
    const gW=h=>{const t1=h.team1.some(p=>p.id===pid);return t1?h.score1:h.score2;};
    const gL=h=>{const t1=h.team1.some(p=>p.id===pid);return t1?h.score2:h.score1;};
    const wins=mm.filter(isW).length;
    const tgw=mm.reduce((s,h)=>s+gW(h),0), tgl=mm.reduce((s,h)=>s+gL(h),0);
    const sosObj=calcSOS(pid,mm,S.roster,range);
    const {exp:expW,tot:expTot}=calcExpectedWins(pid,mm,S.roster,range);
    const overPerf=Math.round((wins-expW)*10)/10;
    // Best partner
    const ps={};mm.forEach(h=>{const ot1=h.team1.some(p=>p.id===pid),mt=ot1?h.team1:h.team2,won=isW(h);mt.filter(p=>p.id!==pid).forEach(p=>{if(!ps[p.id])ps[p.id]={name:p.name,w:0,t:0};ps[p.id].t++;if(won)ps[p.id].w++;});});
    const bestPartner=Object.values(ps).sort((a,b)=>(b.w/b.t)-(a.w/a.t))[0]||null;
    // vs rating bands
    const bands=[{l:'Pro (<15)',min:0,max:15},{l:'Elite (15-20)',min:15,max:20},{l:'Strong Adv (20-25)',min:20,max:25},{l:'Advanced (25-30)',min:25,max:30},{l:'Intermediate (30-35)',min:30,max:35},{l:'Beginner (35-40)',min:35,max:40}];
    const bandData=bands.map(b=>{let w=0,t=0;mm.forEach(h=>{const ot1=h.team1.some(p=>p.id===pid),opp=ot1?h.team2:h.team1;const ws=opp.map(p=>parseFloat(p.wtn)).filter(Boolean);if(!ws.length)return;const avg=ws.reduce((a,x)=>a+x,0)/ws.length;if(avg<b.min||avg>=b.max)return;t++;if(isW(h))w++;});return{...b,w,t};}).filter(b=>b.t>0);
    return {id:pid,name:st.name,wtn:player&&player.wtn||'',w:st.w,l:st.l,gw:tgw,gl:tgl,diff:tgw-tgl,wins,matches:mm.length,winRate:mm.length?Math.round(wins/mm.length*100):0,sosObj,expW,expTot,overPerf,bestPartner,bandData};
  });

  // ── MVP = highest overPerf with data ──
  const mvp=playerData.filter(p=>p.expTot>0).sort((a,b)=>b.overPerf-a.overPerf)[0]||null;

  // ── Build HTML report ──

function renderQuickMatch(pg){
  const qm=S.qm||(S.qm={
    date:today(),fmt:'no-ad',matchType:'practice',
    courtType:'doubles',ad:true,
    team1:[null,null],team2:[null,null],
    sc:{confirmed:false,s1:'',s2:''},
    saved:false
  });

  const card=mk('div','card');
  card.innerHTML='<div class="ct">Quick Match Entry</div>'
    +'<div style="font-size:.72rem;color:var(--text-muted);margin-bottom:12px">Record any match — feeds directly into player analytics and predictions.</div>';

  // Date + match type row
  const r1=mk('div','row');
  const dfg=mk('div','fg');dfg.innerHTML='<label>Date</label>';
  const dinp=mk('input');dinp.type='date';dinp.value=qm.date||today();
  dinp.onchange=e=>{qm.date=e.target.value;};
  dfg.appendChild(dinp);r1.appendChild(dfg);

  const tfg=mk('div','fg');tfg.innerHTML='<label>Court Type</label>';
  const tsel=mk('select');
  ['doubles','singles'].forEach(v=>{const o=mk('option');o.value=v;o.textContent=v.charAt(0).toUpperCase()+v.slice(1);if(qm.courtType===v)o.selected=true;tsel.appendChild(o);});
  tsel.onchange=e=>{qm.courtType=e.target.value;if(e.target.value==='singles'){qm.team1=[qm.team1[0],null];qm.team2=[qm.team2[0],null];}render();};
  tfg.appendChild(tsel);r1.appendChild(tfg);
  card.appendChild(r1);

  // Match type selector
  const mtDiv=mk('div');mtDiv.style.cssText='margin-bottom:12px';
  mtDiv.innerHTML='<div style="font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Match Type</div>';
  const mtRow=mk('div');mtRow.style.cssText='display:flex;gap:5px;flex-wrap:wrap';
  MATCH_TYPES.forEach(mt=>{
    const b=mk('button','btn btn-s btn-sm'+(qm.matchType===mt.key?' sel':''));
    b.innerHTML=mt.icon+' '+mt.label;
    b.style.cssText='font-size:.72rem;padding:5px 10px';
    b.onclick=()=>{qm.matchType=mt.key;render();};
    mtRow.appendChild(b);
  });
  mtDiv.appendChild(mtRow);card.appendChild(mtDiv);

  // Format selector
  const fmtDiv=mk('div');fmtDiv.style.cssText='margin-bottom:12px';
  fmtDiv.innerHTML='<div style="font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Format</div>';
  const fmtRow=mk('div');fmtRow.style.cssText='display:flex;gap:5px;flex-wrap:wrap';
  Object.entries(MATCH_FORMATS).forEach(([k,f])=>{
    const b=mk('button','btn btn-s btn-sm'+(qm.fmt===k?' sel':''));
    b.textContent=f.label;b.style.cssText='font-size:.68rem;padding:4px 8px';
    b.onclick=()=>{qm.fmt=k;qm.sc={confirmed:false};render();};
    fmtRow.appendChild(b);
  });
  fmtDiv.appendChild(fmtRow);card.appendChild(fmtDiv);

  // Player pickers
  const isD=qm.courtType==='doubles';
  const slots=isD?2:1;
  const players=S.roster;

  const teamsDiv=mk('div');teamsDiv.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px';

  [1,2].forEach(tn=>{
    const td=mk('div');
    td.innerHTML='<div style="font-size:.65rem;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Team '+tn+'</div>';
    for(let si=0;si<slots;si++){
      const sel=mk('select');sel.style.cssText='width:100%;margin-bottom:4px';
      const blank=mk('option');blank.value='';blank.textContent='Select player...';sel.appendChild(blank);
      players.forEach(p=>{
        const o=mk('option');o.value=p.id;o.textContent=p.name+(p.wtn?' (WTN '+p.wtn+')':'');
        const curId=tn===1?qm.team1[si]:qm.team2[si];
        if(curId===p.id)o.selected=true;
        sel.appendChild(o);
      });
      sel.onchange=e=>{
        const v=parseInt(e.target.value)||null;
        if(tn===1)qm.team1[si]=v;else qm.team2[si]=v;
      };
      td.appendChild(sel);
    }
    teamsDiv.appendChild(td);
  });
  card.appendChild(teamsDiv);

  // Score entry
  const scoreSect=mk('div');scoreSect.style.cssText='margin-bottom:12px';
  scoreSect.innerHTML='<div style="font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Score</div>';
  const qmFmt=MATCH_FORMATS[qm.fmt]||MATCH_FORMATS['no-ad'];
  if(!qm.sc) qm.sc={confirmed:false};
  buildScoreEntry(scoreSect, 'qm', qm.sc, qmFmt, {scores:{'qm':qm.sc},adOverride:qm.adOverride});
  card.appendChild(scoreSect);

  // Save button
  const saveBtn=mk('button','btn btn-p');
  saveBtn.style.cssText='width:100%;padding:12px;font-size:.95rem';
  saveBtn.textContent='Save Match to History';
  saveBtn.onclick=()=>{
    // Validate players
    const t1ids=qm.team1.filter(Boolean);
    const t2ids=qm.team2.filter(Boolean);
    if(!t1ids.length||!t2ids.length){alert('Please select players for both teams.');return;}
    const t1=t1ids.map(id=>S.roster.find(p=>p.id===id)).filter(Boolean);
    const t2=t2ids.map(id=>S.roster.find(p=>p.id===id)).filter(Boolean);
    const qmFmt2=MATCH_FORMATS[qm.fmt]||MATCH_FORMATS['no-ad'];
    const {g1,g2}=totalGames(qm.sc,qmFmt2);
    const win=scoreWinner(qm.sc,qmFmt2);
    if(!win&&g1===0&&g2===0){alert('Please enter a score before saving.');return;}
    const key='qm-'+Date.now();
    const mt=MATCH_TYPES.find(m=>m.key===qm.matchType)||MATCH_TYPES[0];
    S.history.push({
      _k:key,
      date:qm.date||today(),
      eventName:'',
      sessionLabel:mt.label,
      court:'',
      fmt:qm.courtType,
      matchFmt:qmFmt2.label,
      matchFmtKey:qm.fmt,
      matchType:qm.matchType,
      team1:t1.map(p=>({id:p.id,name:p.name,wtn:p.wtn,wtnSource:p.wtnSource})),
      team2:t2.map(p=>({id:p.id,name:p.name,wtn:p.wtn,wtnSource:p.wtnSource})),
      score1:g1,score2:g2,
      scoreRich:JSON.stringify(qm.sc)
    });
    saveH();
    S.qm=null;
    alert('Match saved!');
    S.page='history';
    render();
  };
  card.appendChild(saveBtn);
  pg.appendChild(card);

  // Wire score entry
  wireScoreEntry('qm', qmFmt, {scores:{'qm':qm.sc},adOverride:qm.adOverride});
}
